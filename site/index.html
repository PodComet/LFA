<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LFA — Labornese Football Association</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b1220;--card:#131d2e;--card2:#1a2738;--border:rgba(255,255,255,.07);--text:#c8d6e5;--text2:#7f8fa6;--white:#f5f6fa;--accent:#3b82f6;--gold:#fbbf24;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--cyan:#06b6d4;--orange:#f59e0b}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
#nav{background:#0d1829;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:20px;font-weight:800;color:var(--white);margin-right:32px;cursor:pointer;letter-spacing:-0.5px}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .15s}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.06);color:var(--white)}
.nav-link.active{background:var(--accent);color:#fff}
#main{max-width:1100px;margin:0 auto;padding:24px}
.page-title{font-size:28px;font-weight:800;color:var(--white);margin-bottom:6px}
.page-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
.breadcrumb{font-size:13px;color:var(--text2);margin-bottom:20px}
.breadcrumb span{cursor:pointer;color:var(--accent)}
.breadcrumb span:hover{text-decoration:underline}

/* Opening Screen */
.os-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;overflow:hidden}
.os-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#162a4a 0%,#0b1220 70%);z-index:0}
.os-bg::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='%23ffffff08'/%3E%3C/svg%3E") repeat;opacity:.5}
.os-card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.os-logo{font-size:48px;font-weight:900;color:var(--white);letter-spacing:-2px;margin-bottom:4px}
.os-logo span{color:var(--gold)}
.os-subtitle{font-size:14px;color:var(--text2);margin-bottom:36px;letter-spacing:1px;text-transform:uppercase}
.os-divider{height:1px;background:var(--border);margin:28px 0}
.os-btn{display:block;width:100%;padding:14px 24px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .15s;margin-bottom:12px}
.os-btn-primary{background:var(--green);color:#fff}
.os-btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.os-btn-secondary{background:transparent;color:var(--white);border:1px solid var(--border)}
.os-btn-secondary:hover{background:rgba(255,255,255,.05);transform:translateY(-1px)}
.os-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.os-season-info{font-size:13px;color:var(--text2);margin-top:4px}
.os-new-section{text-align:left;margin-top:0}
.os-new-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:0 0 10px}
.os-input-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.os-input-row label{font-size:13px;color:var(--text);white-space:nowrap}
.os-input-row input{width:80px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--white);font-size:15px;font-weight:700;text-align:center;font-family:inherit}
.os-back{font-size:13px;color:var(--text2);cursor:pointer;margin-top:8px;display:inline-block}
.os-back:hover{color:var(--white)}

/* Grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-body{padding:18px}
.card-header-bar{padding:14px 18px;display:flex;align-items:center;gap:14px}
.mini-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.card-name{font-size:16px;font-weight:700;color:var(--white)}
.card-detail{font-size:12px;color:var(--text2);margin-top:2px}
.card-stat-row{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--border);font-size:13px}
.card-stat-row .label{color:var(--text2)}.card-stat-row .value{color:var(--white);font-weight:600}

/* Player/Coach full card */
.profile{max-width:750px;margin:0 auto}
.profile-header{display:flex;align-items:center;gap:24px;padding:28px;background:var(--card);border-radius:16px;border:1px solid var(--border);margin-bottom:20px;position:relative;overflow:hidden}
.profile-avatar{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:44px;color:#fff;flex-shrink:0;border:3px solid rgba(255,255,255,.15);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.profile-info{flex:1;z-index:1}
.profile-name{font-size:28px;font-weight:800;color:var(--white);margin-bottom:2px}
.profile-team{font-size:15px;color:var(--text2);margin-bottom:8px}
.profile-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--text2)}
.profile-meta b{color:var(--text);font-weight:600}
.profile-trophies{font-size:20px;letter-spacing:2px;margin:2px 0 4px;line-height:1.2}
.team-card-trophies{font-size:14px;letter-spacing:1px;vertical-align:middle;margin-left:4px}
.rating-circle{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;flex-shrink:0;z-index:1}
.r-high{background:linear-gradient(135deg,#059669,#10b981)}.r-mid{background:linear-gradient(135deg,#d97706,#f59e0b)}.r-low{background:linear-gradient(135deg,#dc2626,#ef4444)}
.captain-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;color:var(--gold);background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);margin-left:8px;vertical-align:middle}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:16px}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:14px}
.skills-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.skill-item{text-align:center;padding:8px;background:rgba(255,255,255,.02);border-radius:8px}
.skill-val{font-size:20px;font-weight:700}.skill-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px}
.sk-h{color:var(--green)}.sk-m{color:var(--orange)}.sk-l{color:var(--red)}
.badge{display:inline-flex;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;margin:3px}
.champ-badge{display:inline-flex;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--gold);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);margin:3px}
table.stats{width:100%;border-collapse:collapse;font-size:13px}
table.stats th{text-align:center;padding:8px 6px;color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
table.stats th:first-child{text-align:left}
table.stats td{text-align:center;padding:7px 6px;border-bottom:1px solid rgba(255,255,255,.03)}
table.stats td:first-child{text-align:left;color:var(--text2);font-weight:600}
table.stats tr:hover td{background:rgba(255,255,255,.02)}
table.stats .totals td{font-weight:700;color:var(--white);border-top:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.02)}

/* Team card */
.team-card{border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid var(--border)}
.team-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.team-card-header{padding:20px;display:flex;align-items:center;gap:16px;position:relative}
.team-crest{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#fff;border:2px solid rgba(255,255,255,.2)}
.team-card-name{font-size:18px;font-weight:700;color:#fff}
.team-card-rating{font-size:13px;color:rgba(255,255,255,.7)}
.team-card-stadium{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.profile-stadium{font-size:13px;color:var(--text2);margin-top:2px;display:inline-flex;align-items:center;gap:4px}
.profile-stadium:hover{color:var(--white)}
.stadium-edit-icon{font-size:11px;opacity:.4;transition:opacity .15s}
.profile-stadium:hover .stadium-edit-icon{opacity:1}
.team-card-body{padding:0 20px 16px;display:flex;gap:20px;flex-wrap:wrap}
.team-mini-stat{text-align:center}.team-mini-stat .tv{font-size:18px;font-weight:700;color:#fff}.team-mini-stat .tl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase}

/* Season card */
.season-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.season-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.season-card-header{padding:20px;text-align:center;position:relative;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.season-num{font-size:32px;font-weight:900;color:#fff;position:relative;z-index:1}
.season-champ{font-size:13px;color:rgba(255,255,255,.8);z-index:1;margin-top:4px}
.season-decal{position:absolute;top:0;left:0;right:0;bottom:0;opacity:.12;display:flex;align-items:center;justify-content:center}
.season-card-body{padding:12px 20px 16px;font-size:12px;color:var(--text2)}

/* Results */
.match-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;transition:background .1s}
.match-row:hover{background:rgba(255,255,255,.03)}
.match-home{flex:1;text-align:right;font-weight:600;color:var(--text)}
.match-score{width:70px;text-align:center;font-weight:800;color:var(--white);font-size:15px}
.match-away{flex:1;text-align:left;font-weight:600;color:var(--text)}
.match-win{color:var(--white)}.match-loss{color:var(--text2)}
.match-draw{color:var(--orange)}

/* Awards */
.award-row{display:flex;align-items:center;gap:16px;padding:16px 20px;background:rgba(255,255,255,.02);border-radius:12px;margin-bottom:10px}
.award-icon{font-size:28px;flex-shrink:0}
.award-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.award-name{font-size:18px;font-weight:700;color:var(--white)}
.award-detail{font-size:13px;color:var(--text2)}
.champion-banner{display:flex;align-items:center;gap:20px;padding:24px;margin-bottom:20px;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.04));border:1px solid rgba(251,191,36,.15);border-radius:16px}
.champion-trophy{font-size:44px}
.champion-title{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.champion-team-name{font-size:24px;color:var(--white);font-weight:800}
.champion-captain{font-size:14px;color:var(--text2);margin-top:4px}

/* Coach record */
.record-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center}
.record-val{font-size:28px;font-weight:800;color:var(--white)}
.record-lbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Sub-navigation tabs */
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;background:rgba(255,255,255,.04);border:1px solid var(--border);transition:all .15s}
.tab:hover{background:rgba(255,255,255,.08);color:var(--white)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Playoff bracket */
.bracket-round{margin-bottom:24px}
.bracket-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px}
.bracket-series{background:rgba(255,255,255,.03);border-radius:10px;padding:14px 18px;margin-bottom:10px;border-left:3px solid var(--accent)}
.bracket-teams{font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px}
.bracket-games{font-size:12px;color:var(--text2)}
.bracket-winner{color:var(--green);font-weight:600}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px}

/* Current Season */
.matchday-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.md-btn{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .15s}
.md-btn:hover{background:rgba(255,255,255,.08);color:var(--white)}
.md-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.md-btn.completed{border-color:var(--green);color:var(--green)}
.md-btn.partial{border-color:var(--orange);color:var(--orange)}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.match-card.completed{border-color:rgba(16,185,129,.2)}
.mc-header{display:flex;align-items:center;padding:16px 20px;gap:12px}
.mc-team{flex:1;display:flex;align-items:center;gap:10px}
.mc-team.away{flex-direction:row-reverse;text-align:right}
.mc-team-name{font-size:15px;font-weight:700;color:var(--white)}
.mc-score{text-align:center;min-width:80px}
.mc-score-value{font-size:24px;font-weight:800;color:var(--white)}
.mc-score-label{font-size:11px;color:var(--text2);margin-top:2px}
.mc-pending{display:flex;gap:8px;justify-content:center}
.mc-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.mc-btn.simulate{background:var(--accent);color:#fff}
.mc-btn.simulate:hover{background:#2563eb}
.mc-btn.enter{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
.mc-btn.enter:hover{background:rgba(255,255,255,.12)}
.mc-btn:disabled{opacity:.5;cursor:not-allowed}
.mc-goal-events{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border);padding:12px 20px}
.mc-goals-col{display:flex;flex-direction:column;gap:4px}
.mc-goals-col.away{text-align:right}
.mc-goal-ev{font-size:12px;color:var(--text);line-height:1.6}
.mc-goal-ev.missed{color:var(--red);opacity:.7;text-decoration:line-through;text-decoration-color:var(--red)}
.mc-assist{color:var(--text2);font-size:11px}
.mc-pen-label{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.5px}
.mc-details{border-top:1px solid var(--border);padding:16px 20px}
.mc-roster{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.mc-roster-team{font-size:12px}
.mc-roster-title{font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-size:11px}
.mc-player{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.mc-player-name{flex:1;font-size:13px;color:var(--text)}
.mc-player-stats{font-size:11px;color:var(--text2)}
.mc-player-grade{display:flex;gap:1px}
.star{color:var(--gold);font-size:11px}
.star.empty{color:#333}
.score-input{display:flex;align-items:center;gap:8px;justify-content:center;padding:12px}
.score-input input{width:50px;height:40px;text-align:center;font-size:20px;font-weight:700;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--white);outline:none}
.score-input input:focus{border-color:var(--accent)}
.score-input .vs{color:var(--text2);font-weight:700}
.score-submit{padding:8px 20px;border-radius:8px;background:var(--green);color:#fff;font-weight:600;border:none;cursor:pointer;font-size:13px}
.score-submit:hover{background:#059669}
.score-cancel{padding:8px 16px;border-radius:8px;background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:13px}
.loading{text-align:center;padding:20px;color:var(--text2);font-size:14px}
.leader-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:20px}
.leader-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.leader-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.leader-title .icon{font-size:16px}
.leader-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.leader-rank{width:22px;text-align:center;font-weight:700;font-size:13px;color:var(--text2)}
.leader-rank.top{color:var(--gold)}
.leader-name{flex:1;font-size:13px;color:var(--white)}
.leader-team{font-size:11px;color:var(--text2)}
.leader-value{font-weight:700;font-size:15px;color:var(--white);min-width:45px;text-align:right}
.stats-btn{background:rgba(251,191,36,.1) !important;border-color:rgba(251,191,36,.3) !important;color:var(--gold) !important}
.stats-btn.active{background:var(--gold) !important;color:#000 !important;border-color:var(--gold) !important}
.coach-btn{background:rgba(99,102,241,.1) !important;border-color:rgba(99,102,241,.3) !important;color:var(--purple) !important}
.coach-btn.active{background:var(--purple) !important;color:#fff !important;border-color:var(--purple) !important}
.coach-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.coach-card-header{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.coach-info{flex:1}
.style-picker{display:flex;gap:6px;flex-wrap:wrap}
.style-opt{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--card2);color:var(--text2);transition:all .15s}
.style-opt:hover{border-color:rgba(255,255,255,.2);color:var(--white)}
.style-opt.active{border-color:var(--accent);background:rgba(59,130,246,.15);color:var(--accent)}
.style-desc{font-size:11px;color:var(--text2);margin-top:4px}
.style-boost{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:2px}
.style-boost.pos{background:rgba(16,185,129,.12);color:var(--green)}
.style-boost.neg{background:rgba(239,68,68,.12);color:var(--red)}
.eos-btn{background:rgba(16,185,129,.1) !important;border-color:rgba(16,185,129,.3) !important;color:var(--green) !important}
.eos-btn.active{background:var(--green) !important;color:#fff !important;border-color:var(--green) !important}
.dev-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px}
.dev-delta{font-size:20px;font-weight:800;min-width:50px;text-align:center}
.dev-delta.up{color:var(--green)}.dev-delta.down{color:var(--red)}.dev-delta.same{color:var(--text2)}
.dev-name{font-size:15px;font-weight:700;color:var(--white)}
.dev-meta{font-size:12px;color:var(--text2)}
.dev-skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.dev-skill{font-size:11px;padding:2px 6px;border-radius:4px}
.dev-skill.up{background:rgba(16,185,129,.12);color:var(--green)}
.dev-skill.down{background:rgba(239,68,68,.12);color:var(--red)}
.pot-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.08);width:60px;display:inline-block;vertical-align:middle;margin-left:6px}
.pot-fill{height:100%;border-radius:2px}

/* Season Editor */
.se-container{max-width:900px;margin:0 auto}
.se-team-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.se-team-header{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s}
.se-team-header:hover{background:var(--card2)}
.se-team-header .se-arrow{color:var(--text2);font-size:12px;transition:transform .2s;margin-left:auto}
.se-team-header.open .se-arrow{transform:rotate(90deg)}
.se-team-name-h{font-size:16px;font-weight:700;color:var(--white)}
.se-team-rating{font-size:13px;color:var(--text2)}
.se-team-body{display:none;padding:0 20px 20px}
.se-team-body.open{display:block}
.se-section{margin-top:16px}
.se-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.se-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.se-label{font-size:12px;color:var(--text2);min-width:70px}
.se-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--white);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.se-input:focus{border-color:var(--accent)}
.se-input.sm{width:70px}.se-input.md{width:140px}.se-input.lg{width:220px}
.se-color{width:36px;height:28px;border:1px solid var(--border);border-radius:6px;padding:1px;cursor:pointer;background:var(--bg)}
.se-player-row{display:grid;grid-template-columns:30px 1fr 60px 60px 60px 36px;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.se-player-row:last-child{border-bottom:none}
.se-player-idx{font-size:11px;color:var(--text2);text-align:center}
.se-player-starter{font-size:10px;font-weight:700;color:var(--green)}
.se-btn{padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:opacity .15s}
.se-btn:hover{opacity:.85}
.se-btn.primary{background:var(--accent);color:#fff}
.se-btn.success{background:var(--green);color:#fff}
.se-btn.danger{background:var(--red);color:#fff}
.se-btn.small{padding:4px 10px;font-size:11px}
.se-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.se-status{padding:8px 16px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.se-status.show{display:block}
.se-status.ok{background:rgba(16,185,129,.12);color:var(--green)}
.se-status.err{background:rgba(239,68,68,.12);color:var(--red)}
.se-transfer-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.se-transfer-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;min-width:340px;max-width:460px}
.se-transfer-box h3{color:var(--white);margin-bottom:16px;font-size:16px}
.se-transfer-box .se-trade-options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.se-trade-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:all .15s;font-size:13px;color:var(--text)}
.se-trade-opt:hover{border-color:var(--accent);background:rgba(59,130,246,.08)}
.se-trade-opt.selected{border-color:var(--accent);background:rgba(59,130,246,.12);color:var(--white)}
.se-trade-opt .trade-icon{font-size:18px;flex-shrink:0;width:28px;text-align:center}
.se-trade-opt .trade-lbl{font-weight:600}
.se-trade-opt .trade-desc{font-size:11px;color:var(--text2)}
.se-add-player-form{display:grid;grid-template-columns:1fr 80px 70px 70px;gap:8px;align-items:end;margin-top:12px;padding:12px;background:rgba(255,255,255,.03);border:1px dashed var(--border);border-radius:8px}
.se-add-player-form label{font-size:10px;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:3px}
.se-coach-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.se-coach-actions button{font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;border:1px solid var(--border);font-family:inherit;transition:all .15s}
.se-coach-actions .trade-away{background:transparent;color:#f87171;border-color:#f8717140}
.se-coach-actions .trade-away:hover{background:rgba(248,113,113,.1);border-color:#f87171}
.se-coach-actions .new-coach{background:transparent;color:var(--green);border-color:rgba(74,222,128,.4)}
.se-coach-actions .new-coach:hover{background:rgba(74,222,128,.1);border-color:var(--green)}

/* Hall of Fame */
.hof-container{max-width:900px;margin:0 auto}
.hof-tabs{display:flex;gap:4px;margin-bottom:20px}
.hof-tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s}
.hof-tab:hover{border-color:var(--accent);color:var(--white)}
.hof-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.hof-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start;transition:border-color .15s}
.hof-card:hover{border-color:var(--accent)}
.hof-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.hof-info{flex:1;min-width:0}
.hof-name{font-size:16px;font-weight:700;color:var(--white);margin-bottom:2px}
.hof-meta{font-size:12px;color:var(--text2);margin-bottom:8px}
.hof-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.hof-status.retired{background:rgba(248,113,113,.15);color:#f87171}
.hof-status.abroad{background:rgba(59,130,246,.15);color:#60a5fa}
.hof-status.non-lfa{background:rgba(251,191,36,.15);color:#fbbf24}
.hof-achievements{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.hof-achv{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;background:rgba(255,255,255,.06);color:var(--text2)}
.hof-achv.gold{background:rgba(251,191,36,.15);color:var(--gold)}
.hof-rating{font-size:22px;font-weight:800;padding:4px 12px;border-radius:8px;color:#fff;flex-shrink:0}
.hof-recall-btn{font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;border:1px solid rgba(74,222,128,.4);background:transparent;color:var(--green);font-family:inherit;margin-top:6px;transition:all .15s}
.hof-recall-btn:hover{background:rgba(74,222,128,.1);border-color:var(--green)}
.hof-career-stat{display:flex;align-items:center;gap:8px;margin:6px 0;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06)}
.hof-career-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.hof-career-value{font-size:16px;font-weight:800;padding:2px 8px;border-radius:6px}
.hof-career-detail{font-size:10px;color:var(--text2);margin-left:auto}
.hof-pct-elite{background:rgba(74,222,128,.15);color:#4ade80}
.hof-pct-good{background:rgba(59,130,246,.15);color:#60a5fa}
.hof-pct-avg{background:rgba(251,191,36,.15);color:#fbbf24}
.hof-pct-low{background:rgba(248,113,113,.15);color:#f87171}
.hof-empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
.se-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--white);font-size:13px;font-family:inherit;width:100%}
.new-season-card{background:linear-gradient(135deg,var(--accent)15,var(--green)15);border:2px dashed var(--accent);border-radius:14px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s,transform .15s}
.new-season-card:hover{border-color:var(--green);transform:translateY(-2px)}

/* New Season Modal */
.nsm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px}
.nsm-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:28px}
.nsm-title{font-size:20px;font-weight:800;color:var(--white);margin-bottom:6px}
.nsm-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.nsm-section{margin-bottom:18px}
.nsm-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:0 0 8px}
.nsm-count{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.nsm-count input{width:60px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:15px;font-weight:700;text-align:center;font-family:inherit}
.nsm-count span{font-size:13px;color:var(--text)}
.nsm-team-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:300px;overflow-y:auto;padding:4px 0}
.nsm-team-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .1s;font-size:13px;color:var(--text)}
.nsm-team-row:hover{background:rgba(255,255,255,.04)}
.nsm-team-row.selected{background:rgba(74,222,128,.1);color:var(--white)}
.nsm-team-row.selected .nsm-check{background:var(--green);border-color:var(--green)}
.nsm-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--white);flex-shrink:0;transition:background .1s,border-color .1s}
.nsm-team-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.nsm-team-name{flex:1;font-weight:600}
.nsm-team-ovr{font-size:11px;color:var(--text2)}
.nsm-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.nsm-footer button{padding:8px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.nsm-btn-cancel{background:transparent;color:var(--text2);border:1px solid var(--border) !important}
.nsm-btn-cancel:hover{background:rgba(255,255,255,.05)}
.nsm-btn-start{background:var(--green);color:#fff}
.nsm-btn-start:hover{opacity:.9}
.nsm-btn-start:disabled{opacity:.4;cursor:not-allowed}
.nsm-info{font-size:12px;color:var(--text2);margin-top:6px;font-style:italic}
.nsm-add-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px;padding:10px;background:rgba(255,255,255,.03);border:1px dashed var(--border);border-radius:8px}
.nsm-add-form input[type="text"]{flex:1;min-width:120px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:13px;font-family:inherit}
.nsm-add-form input[type="color"]{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;background:var(--bg);cursor:pointer;padding:1px}
.nsm-add-form label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.nsm-add-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--green);color:#fff;font-family:inherit;white-space:nowrap}
.nsm-add-btn:hover{opacity:.9}
.nsm-add-btn:disabled{opacity:.4;cursor:not-allowed}
.nsm-new-badge{font-size:9px;background:var(--green);color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px}
.nsm-remove-new{font-size:11px;color:#f87171;cursor:pointer;margin-left:auto;padding:2px 6px;border-radius:4px}
.nsm-remove-new:hover{background:rgba(248,113,113,.15)}

/* Match Stats Editor */
.mse-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px}
.mse-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto;padding:24px}
.mse-title{font-size:18px;font-weight:800;color:var(--white);margin-bottom:4px}
.mse-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.mse-team-section{margin-bottom:20px}
.mse-team-label{font-size:13px;font-weight:700;color:var(--white);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mse-player-grid{display:grid;grid-template-columns:1fr 50px 50px 50px 50px 50px 50px;gap:4px 6px;align-items:center;font-size:12px}
.mse-player-grid.header{font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:4px}
.mse-player-name{color:var(--white);font-size:13px;display:flex;align-items:center;gap:6px}
.mse-player-name .pos{color:var(--text2);font-size:11px}
.mse-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;color:var(--white);font-size:12px;text-align:center;width:100%;font-family:inherit;outline:none}
.mse-input:focus{border-color:var(--accent)}
.mse-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border);padding-top:16px}
.mse-edit-btn{font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card2);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.mse-edit-btn:hover{border-color:var(--accent);color:var(--accent)}

/* International badge */
.intl-badge{display:inline-block;color:silver;font-size:11px;margin-left:4px;vertical-align:middle}

/* Preferences page */
.pref-container{max-width:700px;margin:0 auto}
.pref-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:16px}
.pref-section h3{font-size:14px;font-weight:700;color:var(--white);margin:0 0 14px}
.pref-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.pref-row label{font-size:13px;color:var(--text2);min-width:200px}
.pref-input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--white);font-size:13px;font-family:inherit;outline:none;width:100px}
.pref-input:focus{border-color:var(--accent)}
.pref-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.pref-table th{text-align:left;padding:6px 8px;color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.pref-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03)}
.pref-table td input{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px 6px;color:var(--white);font-size:12px;font-family:inherit;outline:none;width:70px}
.pref-add-btn{font-size:12px;padding:4px 12px;border:1px dashed var(--border);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;margin-top:8px;font-family:inherit}
.pref-add-btn:hover{border-color:var(--accent);color:var(--accent)}
.pref-del{color:var(--red);cursor:pointer;font-size:16px;padding:0 4px}
.pref-save-btn{padding:8px 24px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.pref-save-btn:hover{opacity:.9}

/* Skill Shop page */
.ss-container{max-width:900px;margin:0 auto}
.ss-filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.ss-select{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;font-family:inherit;outline:none;min-width:160px}
.ss-search{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--white);font-size:13px;font-family:inherit;outline:none;flex:1;min-width:150px}
.ss-player-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.ss-player-card:hover{border-color:var(--accent)}
.ss-player-card.expanded{border-color:var(--accent)}
.ss-player-header{display:flex;align-items:center;gap:12px}
.ss-player-name{font-size:14px;font-weight:700;color:var(--white);flex:1}
.ss-player-team{font-size:12px;color:var(--text2)}
.ss-player-pos{font-size:11px;color:var(--text2);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:4px}
.ss-player-rating{font-size:16px;font-weight:800;padding:2px 10px;border-radius:6px;color:#fff}
.ss-skills-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.ss-skill-item{text-align:center}
.ss-skill-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.ss-skill-input{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:4px;color:var(--white);font-size:13px;font-family:inherit;outline:none;width:50px;text-align:center}
.ss-skill-input:focus{border-color:var(--accent)}
.ss-intl-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ss-intl-row label{font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px}
.ss-intl-row input[type=checkbox]{accent-color:var(--accent)}
.ss-save-row{display:flex;gap:8px;margin-top:10px}
.ss-save-btn{padding:6px 16px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.ss-save-btn:hover{opacity:.9}

/* Matchday Report */
.rpt-container{max-width:800px;margin:0 auto}
.rpt-hero{background:linear-gradient(135deg,#1a1a3e,#2d1b4e);border-radius:16px;padding:32px;margin-bottom:24px;border:1px solid rgba(124,58,237,.3);position:relative;overflow:hidden}
.rpt-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;background:radial-gradient(circle,rgba(124,58,237,.15),transparent);pointer-events:none}
.rpt-headline{font-size:28px;font-weight:900;color:var(--white);line-height:1.2;margin-bottom:8px}
.rpt-subheadline{font-size:16px;color:var(--accent);font-weight:600;margin-bottom:16px;font-style:italic}
.rpt-lede{font-size:15px;color:var(--text);line-height:1.7}
.rpt-match{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;overflow:hidden}
.rpt-match-header{padding:16px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.rpt-match-teams{flex:1}
.rpt-match-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:4px}
.rpt-match-venue{font-size:11px;color:var(--text2);margin-bottom:2px}
.rpt-match-score{font-size:22px;font-weight:900;color:var(--accent);white-space:nowrap}
.rpt-match-body{padding:20px;font-size:14px;color:var(--text);line-height:1.8}
.rpt-match-body p{margin:0 0 12px}
.rpt-illustration{width:100%;margin-bottom:16px;border-radius:8px;overflow:hidden}
.rpt-interview{margin:0 20px 16px;padding:18px 20px;background:rgba(255,255,255,0.03);border-left:3px solid #e6a817;border-radius:0 10px 10px 0}
.rpt-interview-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rpt-interview-icon{font-size:16px}
.rpt-interview-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text2)}
.rpt-interview-who{font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px}
.rpt-interview-q{font-size:13px;font-weight:700;color:#e6a817;margin-bottom:4px;line-height:1.5}
.rpt-interview-q-icon{font-weight:900;margin-right:4px}
.rpt-interview-a{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:14px;font-style:italic;padding-left:20px}
.rpt-interview-a-icon{font-weight:900;color:var(--text2);margin-right:4px;font-style:normal}
.rpt-stills{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.rpt-still{border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.rpt-sidebar{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.rpt-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.rpt-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:10px}
.rpt-motm{grid-column:1/-1;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(251,191,36,.02));border-color:rgba(251,191,36,.2)}
.rpt-motm-name{font-size:20px;font-weight:800;color:var(--gold);margin-bottom:4px}
.rpt-motm-team{font-size:13px;color:var(--text2);margin-bottom:8px}
.rpt-motm-reason{font-size:14px;color:var(--text);line-height:1.6}
.rpt-stat{font-size:13px;color:var(--text);padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.rpt-stat:last-child{border:none}
.rpt-lookahead{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;font-size:14px;color:var(--text);line-height:1.8;margin-bottom:24px}
.rpt-lookahead-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:10px}
.rpt-back-btn{display:inline-block;padding:8px 20px;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;background:transparent;transition:all .15s}
.rpt-back-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Responsive */
@media(max-width:600px){
  .profile-header{flex-direction:column;text-align:center}
  .profile-meta{justify-content:center}
  .skills-grid{grid-template-columns:repeat(3,1fr)}
  .nav-links{overflow-x:auto}
  .grid-2{grid-template-columns:1fr}
  .mc-roster{grid-template-columns:1fr}
}

// Helpers

const $ = s => document.querySelector(s)
const h = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e }
function rCls(r) { const n=parseInt(r,10); return n>=82?'r-high':n>=70?'r-mid':'r-low' }
function skCls(v) { const n=parseInt(v,10); return n>=75?'sk-h':n>=55?'sk-m':'sk-l' }
function pct(on,total) { return total>0?Math.round(on/total*100)+'%':'-' }
function teamByName(name) { return LEAGUE.teams.find(t=>t.name===name) }
function seasonByNum(n) { return HISTORY.seasons.find(s=>s.number===n) }
function teamOvr(t) { if (!t||!t.players||!t.players.length) return '-'; const sum = t.players.reduce((s,p)=>s+parseInt(p.rating||0,10),0); return Math.round(sum/t.players.length) }
function teamColor(t) { return (t&&t.colors)?t.colors.primary:'#555' }
function teamColor2(t) { return (t&&t.colors)?t.colors.secondary:'#333' }

// Mini avatar with initials and team colors
function teamAbbrev(team) {
  if (typeof team === 'string') { const t = teamByName(team); return t && t.abbreviation ? t.abbreviation : team.split(' ').map(n=>n[0]).join('').slice(0,3).toUpperCase() }
  return team.abbreviation || team.name.split(' ').map(w=>w[0]).join('').slice(0,3)
}

function miniAv(name,color) {
  const tc = hexLum(color) > 180 ? '#222' : '#fff'
  return '<div class="mini-avatar" style="background:'+color+';color:'+tc+'">'+teamAbbrev(name)+'</div>'
}

// Team crest SVG
function hexLum(hex) {
  hex = hex.replace('#','')
  if (hex.length===3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2]
  const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16)
  return (r*299+g*587+b*114)/1000
}
function teamCrest(team, size) {
  size = size || 56
  const c1 = teamColor(team), c2 = teamColor2(team)
  const init = teamAbbrev(team)
  const fs = init.length > 2 ? 14 : 18
  const textColor = (hexLum(c1) + hexLum(c2)) / 2 > 180 ? '#222' : '#fff'
  return '<svg viewBox="0 0 60 60" width="'+size+'" height="'+size+'"><defs><linearGradient id="tg_'+team.name.replace(/[^a-zA-Z0-9]/g,'')+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient></defs><rect x="2" y="2" width="56" height="56" rx="12" fill="url(#tg_'+team.name.replace(/[^a-zA-Z0-9]/g,'')+')" stroke="rgba(255,255,255,.2)" stroke-width="2"/><text x="30" y="36" text-anchor="middle" fill="'+textColor+'" font-size="'+fs+'" font-weight="900" font-family="Arial">'+init+'</text></svg>'
}

// Team jersey SVG — shirt shape with team colors
function teamJersey(team, size) {
  size = size || 64
  const c1 = teamColor(team), c2 = teamColor2(team)
  const id = 'jrs_'+team.name.replace(/[^a-zA-Z0-9]/g,'')
  // Shirt outline: body is primary, sleeves are secondary, collar and trim in secondary
  return '<svg viewBox="0 0 100 110" width="'+size+'" height="'+(size*1.1)+'">' +
    '<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c1+'dd"/></linearGradient></defs>' +
    // Sleeves (secondary color)
    '<path d="M10,18 L0,40 L8,42 L18,25 Z" fill="'+c2+'" stroke="rgba(255,255,255,.15)" stroke-width="1"/>' +
    '<path d="M90,18 L100,40 L92,42 L82,25 Z" fill="'+c2+'" stroke="rgba(255,255,255,.15)" stroke-width="1"/>' +
    // Body (primary color)
    '<path d="M18,18 L18,100 Q18,108 26,108 L74,108 Q82,108 82,100 L82,18 Q65,10 50,10 Q35,10 18,18 Z" fill="url(#'+id+')" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>' +
    // Collar (secondary)
    '<path d="M35,12 Q42,8 50,7 Q58,8 65,12 L62,18 Q55,14 50,13 Q45,14 38,18 Z" fill="'+c2+'"/>' +
    // Trim stripe across chest (secondary, subtle)
    '<rect x="22" y="38" width="56" height="4" rx="2" fill="'+c2+'" opacity=".35"/>' +
    '</svg>'
}

// Season champion decal SVG (large team-colored emblem)
function championDecal(teamName) {
  const team = teamByName(teamName)
  if (!team) return ''
  const c1 = teamColor(team), c2 = teamColor2(team)
  const init = teamAbbrev(teamName)
  return '<svg viewBox="0 0 200 200" width="200" height="200"><defs><linearGradient id="decal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient></defs>'+
    '<polygon points="100,10 130,40 170,45 140,75 148,115 100,95 52,115 60,75 30,45 70,40" fill="url(#decal)" opacity=".9"/>'+
    '<polygon points="100,25 120,45 150,48 130,70 135,100 100,85 65,100 70,70 50,48 80,45" fill="url(#decal)" opacity=".5"/>'+
    '<circle cx="100" cy="140" r="40" fill="url(#decal)" opacity=".6"/>'+
    '<text x="100" y="68" text-anchor="middle" fill="#fff" font-size="22" font-weight="900" font-family="Arial">'+init+'</text>'+
    '<text x="100" y="148" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="Arial">CHAMPION</text>'+
    '</svg>'
}

// Award color map
const AWARD_COLORS = {mvp:'#8b5cf6',lfaPromise:'#06b6d4',goalkeeperOfSeason:'#f59e0b',fieldPlayerOfYear:'#10b981',coachOfYear:'#6366f1',fichichi:'#ef4444',assistKing:'#3b82f6'}
const AWARD_ICONS = {mvp:'\u{1F3C6}',lfaPromise:'\u2B50',goalkeeperOfSeason:'\u{1F9E4}',fieldPlayerOfYear:'\u26BD',coachOfYear:'\u{1F4CB}',fichichi:'\u{1F525}',assistKing:'\u{1F91D}'}
const AWARD_NAMES = CONFIG.awards

// Collect player awards across seasons
function getPlayerAwards(name, team) {
  const awards = []
  for (const s of HISTORY.seasons) {
    if (!s.awards) continue
    const a = s.awards
    for (const [key, val] of Object.entries(a)) {
      if (val && val.name === name && val.team === team) awards.push({season:s.number, key, label:AWARD_NAMES[key], color:AWARD_COLORS[key]})
    }
  }
  return awards
}
function getPlayerChamps(name, team) {
  const champs = []
  for (const s of HISTORY.seasons) {
    // Legacy trophy format
    if (s.guyKilneTrophy && s.guyKilneTrophy.team === team) {
      champs.push({season:s.number, lifted:s.guyKilneTrophy.captain===name})
    }
    // New champion format (from playoffs)
    else if (s.champion === team) {
      const liftedCap = s.playoffs && s.playoffs.final && s.playoffs.final.captain === name
      champs.push({season:s.number, lifted:liftedCap})
    }
  }
  return champs
}
function getCoachAwards(team) {
  const awards = []
  for (const s of HISTORY.seasons) {
    if (s.awards && s.awards.coachOfYear && s.awards.coachOfYear.team === team) awards.push({season:s.number})
  }
  return awards
}

// -------------------------------------------------------------------------
// New Season Modal
// -------------------------------------------------------------------------
function showNewSeasonModal(onConfirm) {
  const newSeasonNum = HISTORY.currentSeason + 1
  const allTeams = LEAGUE.teams.map(t => ({
    name: t.name,
    color: t.colors ? t.colors.primary : '#888',
    ovr: t.players && t.players.length ? Math.round(t.players.reduce((s,p) => s + parseInt(p.rating||0,10), 0) / t.players.length) : '-'
  }))

  // Track manually added new teams: { name, primary, secondary }
  const newTeams = []

  // Pre-select teams that played in the current season (from schedule)
  const prevTeams = new Set()
  if (typeof SCHEDULE !== 'undefined' && SCHEDULE.matchdays) {
    SCHEDULE.matchdays.forEach(md => md.matches.forEach(m => { prevTeams.add(m.home); prevTeams.add(m.away) }))
  }
  const selected = new Set(prevTeams.size ? prevTeams : allTeams.map(t => t.name))

  const overlay = h('div','nsm-overlay')
  const panel = h('div','nsm-panel')

  function totalSelected() { return selected.size + newTeams.length }

  function render() {
    const total = totalSelected()
    const even = total % 2 === 0
    panel.innerHTML = '<div class="nsm-title">\u26BD Start Season ' + newSeasonNum + '</div>' +
      '<div class="nsm-sub">Choose which teams will participate in Season ' + newSeasonNum + '. Removed teams stay in the database and can return in future seasons.</div>' +
      '<div class="nsm-section">' +
        '<h4>Number of Teams</h4>' +
        '<div class="nsm-count"><input type="number" id="nsm-team-count" min="4" value="' + total + '" readonly> ' +
        '<span>' + total + ' teams (' + selected.size + ' existing' + (newTeams.length ? ' + ' + newTeams.length + ' new' : '') + ')' + (!even ? ' <span style="color:#f87171">(must be even)</span>' : '') + '</span></div>' +
      '</div>' +
      '<div class="nsm-section">' +
        '<h4>Select Participating Teams</h4>' +
        '<div class="nsm-info">Click to toggle. Unselected teams sit out this season but remain in the database.</div>' +
        '<div class="nsm-team-list" id="nsm-teams"></div>' +
      '</div>' +
      '<div class="nsm-section">' +
        '<h4>Add New Team</h4>' +
        '<div class="nsm-add-form">' +
          '<input type="text" id="nsm-new-name" placeholder="Team name">' +
          '<label>Major <input type="color" id="nsm-new-primary" value="#3b82f6"></label>' +
          '<label>Minor <input type="color" id="nsm-new-secondary" value="#ffffff"></label>' +
          '<button class="nsm-add-btn" id="nsm-add-btn">+ Add</button>' +
        '</div>' +
      '</div>' +
      '<div class="nsm-footer">' +
        '<button class="nsm-btn-cancel" id="nsm-cancel">Cancel</button>' +
        '<button class="nsm-btn-start" id="nsm-start"' + (!even || total < 4 ? ' disabled' : '') + '>Start Season ' + newSeasonNum + '</button>' +
      '</div>'

    const list = panel.querySelector('#nsm-teams')

    // Existing teams
    allTeams.forEach(t => {
      const row = h('div','nsm-team-row' + (selected.has(t.name) ? ' selected' : ''))
      row.innerHTML = '<div class="nsm-check">' + (selected.has(t.name) ? '\u2713' : '') + '</div>' +
        '<div class="nsm-team-dot" style="background:' + t.color + '"></div>' +
        '<div class="nsm-team-name">' + t.name + '</div>' +
        '<div class="nsm-team-ovr">' + t.ovr + ' OVR</div>'
      row.onclick = () => {
        if (selected.has(t.name)) selected.delete(t.name)
        else selected.add(t.name)
        render()
      }
      list.appendChild(row)
    })

    // New teams (always selected, with remove button)
    newTeams.forEach((nt, idx) => {
      const row = h('div','nsm-team-row selected')
      row.innerHTML = '<div class="nsm-check">\u2713</div>' +
        '<div class="nsm-team-dot" style="background:' + nt.primary + '"></div>' +
        '<div class="nsm-team-name">' + nt.name + '<span class="nsm-new-badge">NEW</span></div>' +
        '<span class="nsm-remove-new" data-idx="' + idx + '">\u2715 Remove</span>'
      row.querySelector('.nsm-remove-new').onclick = (e) => {
        e.stopPropagation()
        newTeams.splice(idx, 1)
        render()
      }
      list.appendChild(row)
    })

    // Add button handler
    panel.querySelector('#nsm-add-btn').onclick = () => {
      const nameInput = panel.querySelector('#nsm-new-name')
      const name = nameInput.value.trim()
      if (!name) { nameInput.focus(); return }
      const allNames = allTeams.map(t => t.name.toLowerCase()).concat(newTeams.map(t => t.name.toLowerCase()))
      if (allNames.includes(name.toLowerCase())) { alert('A team with that name already exists.'); return }
      const primary = panel.querySelector('#nsm-new-primary').value
      const secondary = panel.querySelector('#nsm-new-secondary').value
      newTeams.push({ name, primary, secondary })
      render()
    }
    // Allow Enter key in name input
    panel.querySelector('#nsm-new-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') panel.querySelector('#nsm-add-btn').click()
    })

    panel.querySelector('#nsm-cancel').onclick = () => overlay.remove()
    const startBtn = panel.querySelector('#nsm-start')
    if (!startBtn.disabled) {
      startBtn.onclick = () => {
        startBtn.disabled = true
        startBtn.textContent = 'Creating season...'
        onConfirm(Array.from(selected), newTeams)
        // overlay will be removed by caller after success
      }
    }
  }

  render()
  overlay.appendChild(panel)
  document.body.appendChild(overlay)
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove() }

  return overlay
}

function renderNav(active) {
  const nav = $('#nav')
  nav.innerHTML = ''
  const logo = h('div','nav-logo','<span>'+CONFIG.league.shortName+'</span> '+CONFIG.league.name)
  logo.onclick = () => go('')
  nav.appendChild(logo)
  const links = h('div','nav-links')
  const items = [['','Home'],['season','Season '+HISTORY.currentSeason],['statistics','Statistics'],['results','Results']]
  for (const [route, label] of items) {
    const link = h('div','nav-link'+(active===route?' active':''),label)
    link.onclick = () => go(route)
    links.appendChild(link)
  }
  nav.appendChild(links)
}

// -------------------------------------------------------------------------
// Router
// -------------------------------------------------------------------------
function go(route) {
  if (window.location.hash === '#' + route || (route === '' && window.location.hash === '')) {
    render()
  } else {
    window.location.hash = route
  }
}
function getRoute() {
  return window.location.hash.replace('#','')
}
window.addEventListener('hashchange', render)

let openingDismissed = false

function render() {
  const route = getRoute()
  const parts = route.split('/')
  const nav = $('#nav')
  const main = $('#main')
  main.innerHTML = ''

  const base = parts[0] || ''

  // Show opening screen on first load (empty route, not yet dismissed)
  if (base === '' && !openingDismissed) {
    nav.style.display = 'none'
    main.style.maxWidth = 'none'
    main.style.padding = '0'
    renderOpeningScreen(main)
    return
  }

  // Normal app mode
  nav.style.display = ''
  main.style.maxWidth = ''
  main.style.padding = ''

  if (base === '' || base === 'home') { openingDismissed = true; renderNav(''); renderHome(main) }
  else if (base === 'edit-season') { renderNav(''); renderSeasonEditor(main, parts[1]) }
  else if (base === 'preferences') { renderNav(''); renderPreferences(main) }
  else if (base === 'skill-shop') { renderNav(''); renderSkillShop(main) }
  else if (base === 'hall-of-fame') { renderNav(''); renderHallOfFame(main) }
  else if (base === 'season') { renderNav('season'); renderCurrentSeason(main, parts.slice(1)) }
  else if (base === 'statistics') { renderNav('statistics'); renderStatistics(main, parts.slice(1)) }
  else if (base === 'results') { renderNav('results'); renderResults(main, parts.slice(1)) }
  else { renderNav(''); main.innerHTML = '<div class="empty-state">Page not found</div>' }
}

function renderOpeningScreen(main) {
  const wrap = h('div','os-wrap')
  wrap.innerHTML = '<div class="os-bg"></div>'

  const card = h('div','os-card')
  const seasonCount = HISTORY.seasons.filter(s => s.champion).length
  const currentS = HISTORY.currentSeason

  card.innerHTML =
    '<div class="os-logo"><span>' + CONFIG.league.shortName + '</span></div>' +
    '<div class="os-subtitle">' + CONFIG.league.name + '</div>' +
    '<button class="os-btn os-btn-primary" id="os-continue">Continue League</button>' +
    '<div class="os-season-info">Season ' + currentS + ' \u2022 ' + LEAGUE.teams.length + ' teams \u2022 ' + seasonCount + ' completed season' + (seasonCount !== 1 ? 's' : '') + '</div>' +
    '<div class="os-divider"></div>' +
    '<button class="os-btn os-btn-secondary" id="os-new">Start New League</button>'

  wrap.appendChild(card)
  main.appendChild(wrap)

  // Continue button
  card.querySelector('#os-continue').onclick = () => {
    openingDismissed = true
    go('home')
  }

  // New league button — reveals setup form
  card.querySelector('#os-new').onclick = () => {
    const bottom = card.querySelector('#os-new-form')
    if (bottom) { bottom.remove(); return }

    const form = document.createElement('div')
    form.id = 'os-new-form'
    form.className = 'os-new-section'
    form.innerHTML =
      '<div class="os-divider"></div>' +
      '<h4>New League Setup</h4>' +
      '<div class="os-input-row">' +
        '<label>Starting season number:</label>' +
        '<input type="number" id="os-season-num" min="1" max="999" value="1">' +
      '</div>' +
      '<div style="font-size:12px;color:var(--text2);margin-bottom:16px">This will reset all season history. Team rosters and league settings will be preserved.</div>' +
      '<button class="os-btn os-btn-primary" id="os-create" style="background:var(--accent)">Create New League</button>' +
      '<div class="os-back" id="os-back-btn">\u2190 Back</div>'

    card.appendChild(form)

    form.querySelector('#os-back-btn').onclick = () => form.remove()

    form.querySelector('#os-create').onclick = async () => {
      const seasonNum = parseInt(form.querySelector('#os-season-num').value, 10)
      if (!seasonNum || seasonNum < 1) { alert('Enter a valid season number.'); return }
      if (!confirm('Start a brand new league from Season ' + seasonNum + '? All existing season history will be cleared.')) return
      const btn = form.querySelector('#os-create')
      btn.disabled = true
      btn.textContent = 'Creating...'
      try {
        const resp = await fetch('/api/new-league', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ startingSeason: seasonNum })
        })
        const data = await resp.json()
        if (data.success) { window.location.reload() }
        else { alert('Error: ' + (data.error || 'Unknown')); btn.disabled = false; btn.textContent = 'Create New League' }
      } catch (e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Create New League' }
    }
  }
}

  expTable.id = 'pref-exp-list'
  function renderExpRows() {
    const exps = window._prefExpansions || PREFS.expansions || []
    let html = '<table class="pref-table"><thead><tr><th>Season</th><th>Additional Teams</th><th></th></tr></thead><tbody>'
    exps.forEach((e, i) => {
      html += '<tr><td><input type="number" min="1" value="'+e.season+'" onchange="window._prefExpansions['+i+'].season=+this.value"></td><td><input type="number" min="1" max="20" value="'+e.teams+'" onchange="window._prefExpansions['+i+'].teams=+this.value"></td><td><span class="pref-del" onclick="window._prefExpansions.splice('+i+',1);window._renderExpRows()">\u2715</span></td></tr>'
    })
    html += '</tbody></table>'
    expTable.innerHTML = html
  }
  window._prefExpansions = JSON.parse(JSON.stringify(PREFS.expansions || []))
  window._renderExpRows = renderExpRows
  renderExpRows()
  sec2.appendChild(expTable)

  const addExpBtn = h('button','pref-add-btn','+ Add Expansion')
  addExpBtn.onclick = () => { window._prefExpansions.push({ season: HISTORY.currentSeason + 1, teams: 2 }); renderExpRows() }

  sec3.innerHTML = '<h3>Contractions</h3><p style="font-size:12px;color:var(--text2);margin:0 0 10px">Remove teams from the league starting from a specific season.</p>'

    let html = '<table class="pref-table"><thead><tr><th>Season</th><th>Fewer Teams</th><th></th></tr></thead><tbody>'
    cons.forEach((c, i) => {

    })
    html += '</tbody></table>'
    conTable.innerHTML = html
  }
  window._prefContractions = JSON.parse(JSON.stringify(PREFS.contractions || []))
  window._renderConRows = renderConRows
  renderConRows()
  sec3.appendChild(conTable)

  const addConBtn = h('button','pref-add-btn','+ Add Contraction')
  addConBtn.onclick = () => { window._prefContractions.push({ season: HISTORY.currentSeason + 1, teams: 2 }); renderConRows() }
  sec3.appendChild(addConBtn)
  container.appendChild(sec3)

  // Save button
  const saveRow = h('div','','')
  saveRow.style.cssText = 'text-align:right;margin-top:16px'
  const saveBtn = h('button','pref-save-btn','Save Preferences')
  saveBtn.onclick = async () => {
    saveBtn.textContent = 'Saving...'
    try {
      const resp = await fetch('/api/preferences', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          startingSeason: parseInt(document.getElementById('pref-start-season').value, 10),
          defaultTeamCount: parseInt(document.getElementById('pref-team-count').value, 10),
          expansions: window._prefExpansions,
          contractions: window._prefContractions
        })
      })
      const data = await resp.json()
      if (data.success) {
        saveBtn.textContent = 'Saved \u2713'
        setTimeout(() => { saveBtn.textContent = 'Save Preferences' }, 2000)
      } else {
        alert('Error: ' + (data.error || 'Unknown'))
        saveBtn.textContent = 'Save Preferences'
      }
    } catch (e) { alert('Error: ' + e.message); saveBtn.textContent = 'Save Preferences' }
  }
  saveRow.appendChild(saveBtn)
  container.appendChild(saveRow)

  main.appendChild(container)
}

  let teamOpts = '<option value="">All Teams</option>'
  LEAGUE.teams.forEach(t => { teamOpts += '<option value="'+t.name+'">'+t.name+'</option>' })
  filters.innerHTML = '<select class="ss-select" id="ss-team-filter" onchange="window._ssFilter()">'+teamOpts+'</select><select class="ss-select" id="ss-pos-filter" onchange="window._ssFilter()"><option value="">All Positions</option><option value="GK">GK</option><option value="CB">CB</option><option value="CM">CM</option><option value="ST">ST</option></select><input class="ss-search" id="ss-search" placeholder="Search player name..." oninput="window._ssFilter()">'
  container.appendChild(filters)

  const list = h('div','')
  list.id = 'ss-player-list'
  container.appendChild(list)

  // Build player data
  const allPlayers = []
  LEAGUE.teams.forEach(t => {
    t.players.forEach(p => {
      allPlayers.push({ name: p.name, team: t.name, teamColors: t.colors, position: p.position, rating: p.rating, skill: { ...p.skill }, international: !!p.international, captain: !!p.captain, starter: !!p.starter })
    })
  })
  window._ssPlayers = allPlayers
  window._ssExpanded = null

  window._ssFilter = function() {
    const teamF = document.getElementById('ss-team-filter').value
    const posF = document.getElementById('ss-pos-filter').value
    const searchF = document.getElementById('ss-search').value.toLowerCase()
    const filtered = allPlayers.filter(p => {
      if (teamF && p.team !== teamF) return false
      if (posF && p.position !== posF) return false
      if (searchF && !p.name.toLowerCase().includes(searchF)) return false
      return true
    })
    window._ssRenderList(filtered)
  }

  window._ssRenderList = function(players) {
    const el = document.getElementById('ss-player-list')
    if (!players.length) { el.innerHTML = '<div class="empty-state">No players match the filter</div>'; return }
    let html = ''
    players.forEach(p => {
      const rCl = parseInt(p.rating,10) >= 82 ? 'r-high' : parseInt(p.rating,10) >= 70 ? 'r-mid' : 'r-low'
      const capBadge = p.captain ? '<span style="display:inline-block;background:var(--gold);color:#000;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;margin-left:4px">C</span>' : ''
      const intlBadge = p.international ? '<span class="intl-badge">\u2605</span>' : ''
      const isExp = window._ssExpanded === p.name + '|' + p.team
      html += '<div class="ss-player-card'+(isExp?' expanded':'')+'" onclick="window._ssToggle(\''+p.name.replace(/'/g,"\\'")+'\',\''+p.team.replace(/'/g,"\\'")+'\')"><div class="ss-player-header"><span class="ss-player-pos">'+p.position+'</span><span class="ss-player-name">'+p.name+capBadge+intlBadge+'</span><span class="ss-player-team">'+p.team+'</span><span class="ss-player-rating '+rCl+'">'+p.rating+'</span></div>'
      if (isExp) {
        const sk = p.skill
        const skillKeys = Object.keys(sk)
        html += '<div class="ss-skills-grid">'
        skillKeys.forEach(k => {
          const lbl = k.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase())
          html += '<div class="ss-skill-item"><div class="ss-skill-lbl">'+lbl+'</div><input type="number" class="ss-skill-input" min="1" max="99" value="'+sk[k]+'" data-player="'+p.name+'" data-team="'+p.team+'" data-skill="'+k+'" onchange="window._ssSkillChange(this)"></div>'
        })
        html += '</div>'
        html += '<div class="ss-intl-row" onclick="event.stopPropagation()"><label><input type="checkbox" '+(p.international?'checked':'')+' onchange="window._ssIntlChange(\''+p.name.replace(/'/g,"\\'")+'\',\''+p.team.replace(/'/g,"\\'")+'\',this.checked)"> Designate as <b>International</b> <span class="intl-badge">\u2605</span> (boost next season skill change)</label></div>'
        html += '<div class="ss-save-row"><button class="ss-save-btn" onclick="event.stopPropagation();window._ssSavePlayer(\''+p.name.replace(/'/g,"\\'")+'\',\''+p.team.replace(/'/g,"\\'")+'\')">Save Changes</button></div>'
      }
      html += '</div>'
    })
    el.innerHTML = html
  }

  window._ssToggle = function(name, team) {
    const key = name + '|' + team
    window._ssExpanded = window._ssExpanded === key ? null : key
    window._ssFilter()
  }

  window._ssSkillChange = function(input) {
    const name = input.dataset.player, team = input.dataset.team, skill = input.dataset.skill, val = input.value
    const p = allPlayers.find(pl => pl.name === name && pl.team === team)
    if (p) p.skill[skill] = val
  }

  window._ssIntlChange = function(name, team, checked) {
    const p = allPlayers.find(pl => pl.name === name && pl.team === team)
    if (p) p.international = checked
  }

  window._ssSavePlayer = async function(name, team) {
    const p = allPlayers.find(pl => pl.name === name && pl.team === team)
    if (!p) return
    try {
      const resp = await fetch('/api/skill-shop/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerName: name, teamName: team, skills: p.skill, international: p.international })
      })
      const data = await resp.json()
      if (data.success) {
        p.rating = data.rating
        p.international = data.international
        window._ssFilter()
      } else { alert('Error: ' + (data.error || 'Unknown')) }
    } catch (e) { alert('Error: ' + e.message) }
  }

  main.appendChild(container)
  window._ssFilter()
}

// -------------------------------------------------------------------------
// STATISTICS
// -------------------------------------------------------------------------
function renderStatistics(main, parts) {
  if (parts.length === 0 || parts[0] === '') return renderStatsMenu(main)
  if (parts[0] === 'seasons') {
    if (parts[1]) return renderSeasonCard(main, parseInt(parts[1],10))
    return renderSeasonsList(main)
  }
  if (parts[0] === 'players') {
    if (parts[1]) return renderPlayerCard(main, decodeURIComponent(parts[1]))
    return renderPlayersList(main)
  }
  if (parts[0] === 'coaches') {
    if (parts[1] !== undefined) return renderCoachCard(main, parseInt(parts[1],10))
    return renderCoachesList(main)
  }
  if (parts[0] === 'teams') {
    if (parts[1]) return renderTeamCard(main, decodeURIComponent(parts[1]))
    return renderTeamsList(main)
  }
  if (parts[0] === 'all-time') return renderAllTimeLeaderboards(main)
}

function renderStatsMenu(main) {
  main.innerHTML = '<div class="page-title">Statistics</div><div class="page-sub">Browse league data</div>'
  const grid = h('div','grid grid-2')
  const items = [
    ['statistics/seasons','\u{1F4C5}','Seasons','Season-by-season statistics and awards'],
    ['statistics/players','\u26BD','Players','Player profiles, career stats, and awards'],
    ['statistics/coaches','\u{1F4CB}','Coaches','Coach records and achievements'],
    ['statistics/teams','\u{1F3DF}','Teams','Team rosters, colors, and performance'],
    ['statistics/all-time','\u{1F451}','All-Time Leaderboards','Top scorers, assists, appearances across all seasons']
  ]
  for (const [route,icon,title,desc] of items) {
    const card = h('div','card')
    card.innerHTML = '<div class="card-body" style="padding:24px"><div style="font-size:28px;margin-bottom:8px">'+icon+'</div><div class="card-name" style="font-size:18px">'+title+'</div><div class="card-detail" style="margin-top:4px">'+desc+'</div></div>'
    card.onclick = () => go(route)
    grid.appendChild(card)
  }
  main.appendChild(grid)
}

// -- Seasons list --
function renderSeasonsList(main) {
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / Seasons</div><div class="page-title">Seasons</div><div class="page-sub">All '+CONFIG.league.shortName+' seasons</div>'

  for (const s of [...HISTORY.seasons].reverse()) {
    const card = h('div','season-card')
    const team = s.champion ? teamByName(s.champion) : null
    const c1 = team ? teamColor(team) : '#333'

    card.innerHTML = '<div class="season-card-header" style="background:linear-gradient(135deg,'+c1+'20,'+c2+'20)">'+(s.champion?'<div class="season-decal">'+championDecal(s.champion)+'</div>':'')+'<div class="season-num">S'+s.number+'</div><div class="season-champ">'+(s.champion?'\u{1F3C6} '+s.champion:'In Progress')+'</div></div><div class="season-card-body">'+(s.standings[0]?'1st: '+s.standings[0].team+' ('+s.standings[0].points+'pts)':'')+'</div>'
    card.onclick = () => go('statistics/seasons/'+s.number)

  }

// -- Season detail card --
function renderSeasonCard(main, num) {
  const s = seasonByNum(num)
  if (!s) { main.innerHTML = '<div class="empty-state">Season not found</div>'; return }
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / <span onclick="go(\u0027statistics/seasons\u0027)">Seasons</span> / S'+num+'</div>'

  const team = s.champion ? teamByName(s.champion) : null
  const c1 = team ? teamColor(team) : '#333'
  const c2 = team ? teamColor2(team) : '#555'

  // Champion banner
  if (s.champion) {
    const banner = h('div','champion-banner')
    banner.innerHTML = '<div class="champion-trophy">\u{1F3C6}</div><div><div class="champion-title">Season '+num+' Champion</div><div class="champion-team-name">'+s.champion+'</div>'+(s.guyKilneTrophy?'<div class="champion-captain">'+CONFIG.trophy.name+': '+s.guyKilneTrophy.captain+'</div>':'')+'</div>'+(team?'<div style="margin-left:auto;opacity:.6">'+teamCrest(team,72)+'</div>':'')
    main.appendChild(banner)
  } else {
    main.appendChild(h('div','page-title','Season '+num+' (In Progress)'))
  }

  // Tabs
  const tabs = h('div','tabs')
  const tabData = [['standings','Standings'],['awards','Awards'],['players','Top Players']]
  let activeTab = 'standings'
  const content = h('div','')

  function renderTab(tab) {
    activeTab = tab
    content.innerHTML = ''
    tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab))
    if (tab === 'standings') renderSeasonStandings(content, s)
    else if (tab === 'awards') renderSeasonAwards(content, s)
    else if (tab === 'players') renderSeasonPlayers(content, s)
  }

  for (const [key,label] of tabData) {
    const t = h('div','tab'+(key===activeTab?' active':''),label)
    t.dataset.tab = key
    t.onclick = () => renderTab(key)
    tabs.appendChild(t)
  }
  main.appendChild(tabs)
  main.appendChild(content)
  renderTab('standings')
}

function renderSeasonStandings(el, s) {
  let rows = ''
  s.standings.forEach((st,i) => {
    const gd = st.gf-st.ga
    const gdStr = gd>0?'+'+gd:gd
    const cls = i<8?'color:var(--white)':'color:var(--text2)'
    const team = teamByName(st.team)
    const ovr = teamOvr(team)
    rows += '<tr style="'+cls+'"><td>'+(i+1)+'</td><td style="cursor:pointer;'+cls+'" onclick="go(\u0027statistics/teams/'+encodeURIComponent(st.team)+'\u0027)">'+st.team+'</td><td style="color:var(--text2);font-size:12px">'+ovr+'</td><td>'+st.played+'</td><td>'+st.won+'</td><td>'+st.drawn+'</td><td>'+st.lost+'</td><td>'+st.gf+'</td><td>'+st.ga+'</td><td>'+gdStr+'</td><td style="font-weight:700">'+st.points+'</td></tr>'
  })
  el.innerHTML = '<div class="section"><div class="section-title">League Table</div><table class="stats"><thead><tr><th>#</th><th>Team</th><th>OVR</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>'+rows+'</tbody></table><div style="margin-top:8px;font-size:11px;color:var(--text2)">Top 8 qualify for playoffs</div></div>'
}

function renderSeasonAwards(el, s) {
  if (!s.awards) { el.innerHTML = '<div class="empty-state">No awards data</div>'; return }
  const a = s.awards
  let html = ''
  for (const [key, val] of Object.entries(a)) {
    if (!val) continue
    let detail = val.team || ''
    if (val.position) detail += ' \u2022 ' + val.position
    if (val.grade) detail += ' \u2022 Grade: ' + val.grade
    if (val.age) detail += ' \u2022 Age ' + val.age
    if (val.saves) detail += ' \u2022 ' + val.saves + ' saves'
    if (val.goals) detail += ' \u2022 ' + val.goals + ' goals'
    if (val.assists !== undefined && key !== 'fichichi') detail += ' \u2022 ' + val.assists + ' assists'
    if (val.perMatch) detail += ' (' + val.perMatch + '/match)'
    if (val.style) detail += ' \u2022 ' + val.style
    html += '<div class="award-row" style="border-left:3px solid '+(AWARD_COLORS[key]||'#555')+'"><div class="award-icon">'+(AWARD_ICONS[key]||'')+'</div><div><div class="award-label">'+(AWARD_NAMES[key]||key)+'</div><div class="award-name">'+(val.name||'')+'</div><div class="award-detail">'+detail+'</div></div></div>'
  }
  el.innerHTML = '<div class="section"><div class="section-title">Season Awards</div>'+html+'</div>'
}

function renderSeasonPlayers(el, s) {
  const stats = s.playerSeasonStats.filter(p=>p.appearances>0)
  const topGoals = [...stats].sort((a,b)=>b.goals-a.goals).slice(0,10)
  const topAssists = [...stats].sort((a,b)=>b.assists-a.assists).slice(0,10)
  let html = '<div class="section"><div class="section-title">Top Scorers</div><table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>App</th><th>Goals</th><th>Assists</th></tr></thead><tbody>'
  topGoals.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td style="cursor:pointer;color:var(--white)" onclick="go(\u0027statistics/players/'+encodeURIComponent(p.name)+'\u0027)">'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.appearances+'</td><td style="font-weight:700;color:var(--white)">'+p.goals+'</td><td>'+p.assists+'</td></tr>' })
  html += '</tbody></table></div>'
  html += '<div class="section"><div class="section-title">Top Assists</div><table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>App</th><th>Assists</th></tr></thead><tbody>'
  topAssists.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td style="cursor:pointer;color:var(--white)" onclick="go(\u0027statistics/players/'+encodeURIComponent(p.name)+'\u0027)">'+p.name+'</td><td>'+p.team+'</td><td>'+p.appearances+'</td><td style="font-weight:700;color:var(--white)">'+p.assists+'</td></tr>' })
  html += '</tbody></table></div>'
  el.innerHTML = html
}

// -- Players list --

  // Team filter tabs
  const tabs = h('div','tabs')

  tabs.appendChild(allTab)
  for (const t of LEAGUE.teams) {
    const tab = h('div','tab',t.name)
    tab.style.borderColor = teamColor(t)
    tab.onclick = () => filterPlayers(t.name)
    tabs.appendChild(tab)
  }
  main.appendChild(tabs)

  const grid = h('div','grid grid-3')
  grid.id = 'players-grid'
  main.appendChild(grid)

  window._filterPlayers = filterPlayers

  function filterPlayers(teamName) {

        card.innerHTML = '<div class="card-header-bar" style="border-bottom:2px solid '+c+'30">'+miniAv(p.name,c)+'<div><div class="card-name">'+p.name+pBadges+'</div><div class="card-detail">'+p.position+' \u2022 '+team.name+' \u2022 Rtg '+p.rating+'</div></div></div>'

        grid.appendChild(card)
      }
