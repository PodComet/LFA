// -- Player full card --
function renderPlayerCard(main, name) {
  let team=null, player=null
  for (const t of LEAGUE.teams) {
    const p = t.players.find(p=>p.name===name)
    if (p) { team=t; player=p; break }
  }
  if (!player) { main.innerHTML='<div class="empty-state">Player not found: '+name+'</div>'; return }
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / <span onclick="go(\u0027statistics/players\u0027)">Players</span> / '+name+'</div>'

  const c1=teamColor(team),c2=teamColor2(team)
  const isCaptain = player.captain
  const isIntl = player.international
  const isStarter = team.players.indexOf(player) < 6
  const awards = getPlayerAwards(name, team.name)
  const champs = getPlayerChamps(name, team.name)

  // Profile header
  const header = h('div','profile-header')
  header.style.background = 'linear-gradient(135deg,'+c1+'15,'+c2+'15)'
  header.innerHTML = '<div class="profile-avatar" style="background:linear-gradient(135deg,'+c1+','+c2+')">'+player.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()+'</div><div class="profile-info"><div class="profile-name">'+player.name+(isCaptain?'<span class="captain-badge">C</span>':'')+(isIntl?'<span class="intl-badge">\u2605</span>':'')+'</div><div class="profile-team">'+team.name+' \u2014 '+player.position+(isStarter?'':' (Sub)')+'</div><div class="profile-meta"><div>Age: <b>'+(player.age||'-')+'</b></div><div>Height: <b>'+player.height+'cm</b></div></div></div><div class="rating-circle '+rCls(player.rating)+'">'+player.rating+'</div>'
  main.appendChild(header)

  // Skills
  const sk = player.skill
  const skillItems = [{l:'SPD',v:sk.speed},{l:'PAS',v:sk.passing},{l:'SHO',v:sk.shooting},{l:'TCK',v:sk.tackling},{l:'SAV',v:sk.saving},{l:'AGI',v:sk.agility},{l:'STR',v:sk.strength},{l:'JMP',v:sk.jumping},{l:'MRK',v:sk.marking},{l:'HDG',v:sk.head_game},{l:'SET',v:sk.set_piece_taking},{l:'PEN',v:sk.penalty_taking}]
  const skillsHtml = skillItems.map(s=>'<div class="skill-item"><div class="skill-val '+skCls(s.v)+'">'+s.v+'</div><div class="skill-lbl">'+s.l+'</div></div>').join('')
  main.appendChild(h('div','section','<div class="section-title">Skills</div><div class="skills-grid">'+skillsHtml+'</div>'))

  // Championships
  const champsHtml = champs.length>0 ? champs.map(c=>'<span class="champ-badge">'+(c.lifted?'\u{1F3C6}':'\u{1F3C5}')+' S'+c.season+(c.lifted?' (Captain)':'')+'</span>').join('') : '<span style="color:var(--text2);font-size:13px">No championships yet</span>'
  main.appendChild(h('div','section','<div class="section-title">Championships</div>'+champsHtml))

  // Awards
  let awardsHtml = ''
  if (isIntl) awardsHtml += '<span class="badge" style="background:#6b7280">\u2605 International</span>'
  awardsHtml += awards.map(a=>'<span class="badge" style="background:'+a.color+'">S'+a.season+' '+a.label+'</span>').join('')
  if (!awardsHtml) awardsHtml = '<span style="color:var(--text2);font-size:13px">No individual awards yet</span>'
  main.appendChild(h('div','section','<div class="section-title">Awards</div>'+awardsHtml))

  // Career stats
  const isGK = player.position==='GK'
  let rows='', tot={app:0,gls:0,ast:0,sht:0,shtOn:0,pas:0,pasOn:0,tck:0,tckOn:0,fls:0,sav:0}
  for (const s of HISTORY.seasons) {
    const ps = s.playerSeasonStats.find(p=>p.name===name&&p.team===team.name)
    if (!ps||ps.appearances===0) continue
    tot.app+=ps.appearances;tot.gls+=ps.goals;tot.ast+=ps.assists;tot.sht+=ps.shots.total;tot.shtOn+=ps.shots.on;tot.pas+=ps.passes.total;tot.pasOn+=ps.passes.on;tot.tck+=ps.tackles.total;tot.tckOn+=ps.tackles.on;tot.fls+=ps.tackles.fouls;if(ps.saves!==undefined)tot.sav+=ps.saves
    if (isGK) rows+='<tr><td>S'+s.number+'</td><td>'+ps.appearances+'</td><td>'+ps.goals+'</td><td>'+ps.assists+'</td><td>'+(ps.saves||0)+'</td><td>'+ps.passes.total+'</td><td>'+pct(ps.passes.on,ps.passes.total)+'</td><td>'+ps.tackles.total+'</td><td>'+ps.tackles.fouls+'</td></tr>'
    else rows+='<tr><td>S'+s.number+'</td><td>'+ps.appearances+'</td><td>'+ps.goals+'</td><td>'+ps.assists+'</td><td>'+ps.shots.total+'</td><td>'+pct(ps.shots.on,ps.shots.total)+'</td><td>'+ps.passes.total+'</td><td>'+pct(ps.passes.on,ps.passes.total)+'</td><td>'+ps.tackles.total+'</td><td>'+ps.tackles.fouls+'</td></tr>'
  }
  const hdr = isGK?'<th>Season</th><th>App</th><th>Gls</th><th>Ast</th><th>Saves</th><th>Pass</th><th>Pas%</th><th>Tck</th><th>Fouls</th>':'<th>Season</th><th>App</th><th>Gls</th><th>Ast</th><th>Shots</th><th>Sht%</th><th>Pass</th><th>Pas%</th><th>Tck</th><th>Fouls</th>'

}

// -- Coach full card --
function renderCoachCard(main, idx) {
  const team = LEAGUE.teams[idx]
  if (!team||!team.coach) { main.innerHTML='<div class="empty-state">Coach not found</div>'; return }
  const coach = team.coach
  const c1=teamColor(team),c2=teamColor2(team)
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / <span onclick="go(\u0027statistics/coaches\u0027)">Coaches</span> / '+coach.name+'</div>'

  const header = h('div','profile-header')
  header.style.background = 'linear-gradient(135deg,'+c1+'15,'+c2+'15)'
  const coachTitles = HISTORY.seasons.filter(s=>s.champion===team.name).length
  const coachTrophyIcons = coachTitles > 0 ? '<div class="profile-trophies">'+'\u{1F3C6}'.repeat(coachTitles)+'</div>' : ''
  header.innerHTML = '<div class="profile-avatar" style="background:linear-gradient(135deg,#2d2d2d,#444)">'+coach.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()+'</div><div class="profile-info"><div class="profile-name">'+coach.name+'</div><div class="profile-team">'+team.name+' \u2014 Head Coach</div>'+coachTrophyIcons+'<div class="profile-meta"><div>Age: <b>'+(coach.age||'-')+'</b></div><div>Style: <b>'+coach.style+'</b></div></div></div><div class="rating-circle '+rCls(coach.rating)+'">'+coach.rating+'</div>'
  main.appendChild(header)

  // Career record
  let totalW=0,totalD=0,totalL=0,totalP=0,titles=0
  let rows = ''
  for (const s of HISTORY.seasons) {
    const cs = s.coachSeasonStats.find(c=>c.team===team.name)
    if (!cs||cs.played===0) continue
    totalW+=cs.won;totalD+=cs.drawn;totalL+=cs.lost;totalP+=cs.played
    const rank = s.standings.findIndex(st=>st.team===team.name)+1
    const isChamp = s.champion===team.name
    if (isChamp) titles++
    rows += '<tr><td>S'+s.number+'</td><td>'+cs.played+'</td><td>'+cs.won+'</td><td>'+cs.drawn+'</td><td>'+cs.lost+'</td><td>'+cs.points+'</td><td>#'+rank+(isChamp?' \u{1F3C6}':'')+'</td></tr>'
  }
  const totRow = '<tr class="totals"><td>TOTAL</td><td>'+totalP+'</td><td>'+totalW+'</td><td>'+totalD+'</td><td>'+totalL+'</td><td>'+(totalW*3+totalD)+'</td><td>'+titles+' titles</td></tr>'

  const winPct = totalP > 0 ? (((totalW + totalD * 0.5) / totalP) * 100).toFixed(1) + '%' : '-'
  main.appendChild(h('div','section','<div class="section-title">Career Record</div><div class="record-grid"><div><div class="record-val">'+totalW+'</div><div class="record-lbl">Wins</div></div><div><div class="record-val">'+totalD+'</div><div class="record-lbl">Draws</div></div><div><div class="record-val">'+totalL+'</div><div class="record-lbl">Losses</div></div><div><div class="record-val">'+winPct+'</div><div class="record-lbl">Win %</div></div><div><div class="record-val">'+titles+'</div><div class="record-lbl">Titles</div></div></div>'))

  // Championships
  const champSeasons = HISTORY.seasons.filter(s=>s.champion===team.name)
  const champsHtml = champSeasons.length>0?champSeasons.map(s=>'<span class="champ-badge">\u{1F3C6} S'+s.number+'</span>').join(''):'<span style="color:var(--text2);font-size:13px">No championships</span>'
  main.appendChild(h('div','section','<div class="section-title">Championships</div>'+champsHtml))

  // Awards
  const coachAwards = getCoachAwards(team.name)
  const awardsHtml = coachAwards.length>0?coachAwards.map(a=>'<span class="badge" style="background:var(--purple)">S'+a.season+' '+CONFIG.awards.coachOfYear+'</span>').join(''):'<span style="color:var(--text2);font-size:13px">No awards</span>'
  main.appendChild(h('div','section','<div class="section-title">Awards</div>'+awardsHtml))

  // Season table
  main.appendChild(h('div','section','<div class="section-title">Season-by-Season Record</div><table class="stats"><thead><tr><th>Season</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th>Finish</th></tr></thead><tbody>'+rows+totRow+'</tbody></table>'))
}

// -- All-Time Leaderboards --
function renderAllTimeLeaderboards(main) {
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / All-Time Leaderboards</div><div class="page-title">\u{1F451} All-Time Leaderboards</div><div class="page-sub">Career records across all '+CONFIG.league.shortName+' seasons</div>'

  // Aggregate player stats across all seasons
  const playerCareer = {}
  for (const s of HISTORY.seasons) {
    if (!s.playerSeasonStats) continue
    for (const ps of s.playerSeasonStats) {
      if (!playerCareer[ps.name]) playerCareer[ps.name] = { name: ps.name, team: ps.team, position: ps.position, goals: 0, assists: 0, appearances: 0, seasons: 0, ratings: [], saves: 0 }
      const p = playerCareer[ps.name]
      p.goals += (ps.goals || 0)
      p.assists += (ps.assists || 0)
      p.appearances += (ps.appearances || 0)
      p.saves += (ps.saves || 0)
      p.seasons++
      if (ps.rating) p.ratings.push(parseFloat(ps.rating))
      p.team = ps.team  // update to most recent team
      p.position = ps.position
    }
  }
  const allPlayers = Object.values(playerCareer)
  allPlayers.forEach(p => { p.avgRating = p.ratings.length > 0 ? (p.ratings.reduce((a,b)=>a+b,0)/p.ratings.length) : 0 })

  // Aggregate coach stats
  const coachCareer = {}
  for (const s of HISTORY.seasons) {
    if (!s.coachSeasonStats) continue
    for (const cs of s.coachSeasonStats) {
      if (!coachCareer[cs.coach]) coachCareer[cs.coach] = { name: cs.coach, team: cs.team, style: cs.style, won: 0, drawn: 0, lost: 0, points: 0, played: 0, seasons: 0, titles: 0 }
      const c = coachCareer[cs.coach]
      c.won += (cs.won || 0)
      c.drawn += (cs.drawn || 0)
      c.lost += (cs.lost || 0)
      c.points += (cs.points || 0)
      c.played += (cs.played || 0)
      c.seasons++
      c.team = cs.team
      c.style = cs.style
    }
  }
  for (const s of HISTORY.seasons) {
    if (!s.champion || !s.coachSeasonStats) continue
    const chCS = s.coachSeasonStats.find(cs => cs.team === s.champion)
    if (chCS && coachCareer[chCS.coach]) coachCareer[chCS.coach].titles++
  }
  const allCoaches = Object.values(coachCareer)
  allCoaches.forEach(c => { c.successPct = c.played > 0 ? (c.points / (c.played * 3)) * 100 : 0 })

  // Tabs
  const container = h('div','hof-container')
  const tabs = h('div','hof-tabs')
  tabs.innerHTML = '<button class="hof-tab active" data-tab="goals">\u26BD Top Scorers</button><button class="hof-tab" data-tab="assists">\u{1F3AF} Assists</button><button class="hof-tab" data-tab="apps">\u{1F4C5} Appearances</button><button class="hof-tab" data-tab="rating">\u2B50 Avg Rating</button><button class="hof-tab" data-tab="saves">\u{1F9E4} Saves</button><button class="hof-tab" data-tab="coaches">\u{1F4CB} Coaches</button>'
  container.appendChild(tabs)
  const content = h('div','hof-content')
  container.appendChild(content)

  function pLink(name) { return 'onclick="go(\u0027statistics/players/'+encodeURIComponent(name)+'\u0027)" style="cursor:pointer;color:var(--white)"' }

  function renderLeaderTab(tab) {
    tabs.querySelectorAll('.hof-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab))
    content.innerHTML = ''
    let html = ''

    if (tab === 'goals') {
      const sorted = [...allPlayers].sort((a,b) => b.goals - a.goals).slice(0, 30)
      html = '<table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>Seasons</th><th>Apps</th><th style="color:var(--white)">Goals</th><th>Assists</th></tr></thead><tbody>'
      sorted.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td '+pLink(p.name)+'>'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.seasons+'</td><td>'+p.appearances+'</td><td style="font-weight:700;color:var(--white)">'+p.goals+'</td><td>'+p.assists+'</td></tr>' })
      html += '</tbody></table>'
    } else if (tab === 'assists') {
      const sorted = [...allPlayers].sort((a,b) => b.assists - a.assists).slice(0, 30)
      html = '<table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>Seasons</th><th>Apps</th><th>Goals</th><th style="color:var(--white)">Assists</th></tr></thead><tbody>'
      sorted.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td '+pLink(p.name)+'>'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.seasons+'</td><td>'+p.appearances+'</td><td>'+p.goals+'</td><td style="font-weight:700;color:var(--white)">'+p.assists+'</td></tr>' })
      html += '</tbody></table>'
    } else if (tab === 'apps') {
      const sorted = [...allPlayers].sort((a,b) => b.appearances - a.appearances).slice(0, 30)
      html = '<table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>Seasons</th><th style="color:var(--white)">Apps</th><th>Goals</th><th>Assists</th></tr></thead><tbody>'
      sorted.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td '+pLink(p.name)+'>'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.seasons+'</td><td style="font-weight:700;color:var(--white)">'+p.appearances+'</td><td>'+p.goals+'</td><td>'+p.assists+'</td></tr>' })
      html += '</tbody></table>'
    } else if (tab === 'rating') {
      const sorted = [...allPlayers].filter(p => p.seasons >= 2).sort((a,b) => b.avgRating - a.avgRating).slice(0, 30)
      html = '<div style="font-size:11px;color:var(--text2);margin-bottom:8px">Minimum 2 seasons</div>'
      html += '<table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>Seasons</th><th>Apps</th><th style="color:var(--white)">Avg Rating</th></tr></thead><tbody>'
      sorted.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td '+pLink(p.name)+'>'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.seasons+'</td><td>'+p.appearances+'</td><td style="font-weight:700;color:var(--white)">'+p.avgRating.toFixed(1)+'</td></tr>' })
      html += '</tbody></table>'
    } else if (tab === 'saves') {
      const sorted = [...allPlayers].filter(p => p.saves > 0).sort((a,b) => b.saves - a.saves).slice(0, 30)
      html = '<table class="stats"><thead><tr><th>#</th><th>Player</th><th>Team</th><th>Pos</th><th>Seasons</th><th>Apps</th><th style="color:var(--white)">Saves</th></tr></thead><tbody>'
      sorted.forEach((p,i) => { html += '<tr><td>'+(i+1)+'</td><td '+pLink(p.name)+'>'+p.name+'</td><td>'+p.team+'</td><td>'+p.position+'</td><td>'+p.seasons+'</td><td>'+p.appearances+'</td><td style="font-weight:700;color:var(--white)">'+p.saves+'</td></tr>' })
      html += '</tbody></table>'
    } else if (tab === 'coaches') {
      const sorted = [...allCoaches].sort((a,b) => b.successPct - a.successPct)
      html = '<table class="stats"><thead><tr><th>#</th><th>Coach</th><th>Last Team</th><th>Style</th><th>Seasons</th><th>W</th><th>D</th><th>L</th><th>Pts</th><th style="color:var(--white)">Success %</th><th>Titles</th></tr></thead><tbody>'
      sorted.forEach((c,i) => { html += '<tr><td>'+(i+1)+'</td><td style="color:var(--white)">'+c.name+'</td><td>'+c.team+'</td><td>'+c.style+'</td><td>'+c.seasons+'</td><td>'+c.won+'</td><td>'+c.drawn+'</td><td>'+c.lost+'</td><td>'+c.points+'</td><td style="font-weight:700;color:var(--white)">'+c.successPct.toFixed(1)+'%</td><td>'+(c.titles>0?'\u{1F3C6}'.repeat(c.titles):'-')+'</td></tr>' })
      html += '</tbody></table>'
    }

    content.innerHTML = html
  }

  tabs.onclick = (e) => { if (e.target.dataset.tab) renderLeaderTab(e.target.dataset.tab) }
  renderLeaderTab('goals')
  main.appendChild(container)
}

// -- Team full card --
function renderTeamCard(main, name) {
  const team = teamByName(name)
  if (!team) { main.innerHTML='<div class="empty-state">Team not found</div>'; return }
  const c1=teamColor(team),c2=teamColor2(team)
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027statistics\u0027)">Statistics</span> / <span onclick="go(\u0027statistics/teams\u0027)">Teams</span> / '+name+'</div>'

  // Team header
  const header = h('div','profile-header')
  header.style.background = 'linear-gradient(135deg,'+c1+'25,'+c2+'20)'
  const titles = HISTORY.seasons.filter(s=>s.champion===name).length
  const captain = team.players.find(p => p.captain)
  const teamTrophyIcons = titles > 0 ? '<div class="profile-trophies">'+'\u{1F3C6}'.repeat(titles)+'</div>' : ''
  const stadiumHtml = '<div class="profile-stadium" style="cursor:pointer" onclick="editStadium(\u0027'+name.replace(/'/g,"\\'")+'\u0027, this)" title="Click to rename">\u{1F3DF} '+(team.stadium||'No stadium')+'<span class="stadium-edit-icon"> \u270E</span></div>'
  header.innerHTML = '<div style="flex-shrink:0;display:flex;gap:12px;align-items:center">'+teamCrest(team,72)+teamJersey(team,64)+'</div><div class="profile-info"><div class="profile-name" style="color:#fff">'+name+'</div><div class="profile-team">'+(team.coach?'Coach: '+team.coach.name+' ('+team.coach.style+')':'No coach')+'</div>'+stadiumHtml+teamTrophyIcons+'<div class="profile-meta"><div>Rating: <b>'+team.rating+'</b></div><div>Titles: <b>'+titles+'</b></div><div>Captain: <b>'+(captain?captain.name:'-')+'</b></div></div></div><div class="rating-circle '+rCls(team.rating)+'">'+team.rating+'</div>'
  main.appendChild(header)

  // Roster
  let rosterRows = ''
  team.players.forEach((p,i) => {
    const starter = i<6?'':'<span style="color:var(--text2);font-size:11px"> (sub)</span>'
    const capBadge = p.captain ? '<span style="display:inline-block;background:var(--gold);color:#000;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:middle">C</span>' : ''
    const intlBadge = p.international ? '<span class="intl-badge">\u2605</span>' : ''
    rosterRows += '<tr><td style="cursor:pointer;color:var(--white)" onclick="go(\u0027statistics/players/'+encodeURIComponent(p.name)+'\u0027)">'+p.name+capBadge+intlBadge+starter+'</td><td>'+p.position+'</td><td>'+p.rating+'</td><td>'+(p.age||'-')+'</td><td>'+p.height+'cm</td></tr>'
  })
  main.appendChild(h('div','section','<div class="section-title">Roster</div><table class="stats"><thead><tr><th>Name</th><th>Pos</th><th>Rtg</th><th>Age</th><th>Height</th></tr></thead><tbody>'+rosterRows+'</tbody></table>'))

  // Season history
  let histRows = ''
  for (const s of HISTORY.seasons) {
    const st = s.standings.find(x=>x.team===name)
    if (!st || st.played===0) continue
    const rank = s.standings.indexOf(st)+1
    const isChamp = s.champion===name
    histRows += '<tr><td>S'+s.number+'</td><td>'+st.played+'</td><td>'+st.won+'</td><td>'+st.drawn+'</td><td>'+st.lost+'</td><td>'+st.gf+'</td><td>'+st.ga+'</td><td style="font-weight:700">'+st.points+'</td><td>#'+rank+(isChamp?' \u{1F3C6}':'')+'</td></tr>'
  }
  main.appendChild(h('div','section','<div class="section-title">Season History</div><table class="stats"><thead><tr><th>Season</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>Pts</th><th>Finish</th></tr></thead><tbody>'+histRows+'</tbody></table>'))
}

function renderResults(main, parts) {

  return renderSeasonResults(main, parseInt(parts[0],10))
}

function renderResultsMenu(main) {
  main.innerHTML = '<div class="page-title">Results</div><div class="page-sub">Full match results by season</div>'
  const grid = h('div','grid grid-4')
  for (const s of [...HISTORY.seasons].reverse()) {
    const team = s.champion ? teamByName(s.champion) : null

function renderSeasonResults(main, num) {
  const s = seasonByNum(num)
  if (!s) { main.innerHTML='<div class="empty-state">Season not found</div>'; return }
  main.innerHTML = '<div class="breadcrumb"><span onclick="go(\u0027results\u0027)">Results</span> / Season '+num+'</div>'

  if (s.champion) {
    const team = teamByName(s.champion)
    const c1 = team?teamColor(team):'#333'
    const banner = h('div','champion-banner')
    banner.innerHTML = '<div class="champion-trophy">\u{1F3C6}</div><div><div class="champion-title">Season '+num+' Champion</div><div class="champion-team-name">'+s.champion+'</div>'+(s.guyKilneTrophy?'<div class="champion-captain">'+CONFIG.trophy.name+': '+s.guyKilneTrophy.captain+'</div>':'')+'</div>'
    main.appendChild(banner)
  }

  // Tabs
  const tabs = h('div','tabs')
  const content = h('div','')
  const tabData = [['regular','Regular Season'],['playoffs','Playoffs'],['awards','Awards']]
  let activeTab = 'regular'

  function renderTab(tab) {
    activeTab = tab
    content.innerHTML = ''
    tabs.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab))
    if (tab==='regular') renderRegularResults(content, s)
    else if (tab==='playoffs') renderPlayoffResults(content, s)
    else if (tab==='awards') renderSeasonAwards(content, s)
  }

  for (const [key,label] of tabData) {
    const t = h('div','tab'+(key===activeTab?' active':''),label)
    t.dataset.tab = key
    t.onclick = () => renderTab(key)
    tabs.appendChild(t)
  }
  main.appendChild(tabs)
  main.appendChild(content)
  renderTab('regular')
}

function renderRegularResults(el, s) {
  if (!s.matchResults || s.matchResults.length===0) { el.innerHTML='<div class="empty-state">No match data</div>'; return }
  let html = '<div class="section"><div class="section-title">Regular Season Matches ('+s.matchResults.length+' matches)</div>'
  for (const m of s.matchResults) {
    const homeWin = m.score[0]>m.score[1], awayWin = m.score[1]>m.score[0], draw = m.score[0]===m.score[1]
    const hCls = homeWin?'match-win':draw?'match-draw':'match-loss'
    const aCls = awayWin?'match-win':draw?'match-draw':'match-loss'
    html += '<div class="match-row"><div class="match-home '+hCls+'">'+m.home+'</div><div class="match-score">'+m.score[0]+' - '+m.score[1]+'</div><div class="match-away '+aCls+'">'+m.away+'</div></div>'
  }
  html += '</div>'
  el.innerHTML = html
}

function renderPlayoffResults(el, s) {
  if (!s.playoffs) { el.innerHTML='<div class="empty-state">No playoff data</div>'; return }
  const po = s.playoffs
  let html = ''

  // QF
  html += '<div class="section"><div class="section-title">Quarterfinals (Best of 3)</div>'
  for (const qf of po.quarterFinals) {
    html += '<div class="bracket-series"><div class="bracket-teams">#'+qf.seedNums[0]+' '+qf.higherSeed+' vs #'+qf.seedNums[1]+' '+qf.lowerSeed+' \u2014 <span class="bracket-winner">'+qf.winner+' wins '+qf.seriesScore+'</span></div><div class="bracket-games">'
    qf.games.forEach((g,i) => { html += 'G'+(i+1)+': '+g.home+' '+g.score[0]+'-'+g.score[1]+' '+g.away+'&nbsp;&nbsp;' })
    html += '</div></div>'
  }
  html += '</div>'

  // SF
  html += '<div class="section"><div class="section-title">Semifinals (Neutral Site)</div>'
  for (const sf of po.semiFinals) {
    html += '<div class="bracket-series" style="border-left-color:var(--orange)"><div class="bracket-teams">'+sf.team1+' vs '+sf.team2+' \u2014 <span class="bracket-winner">'+sf.winner+' wins</span></div><div class="bracket-games">'+sf.team1+' '+sf.score[0]+'-'+sf.score[1]+' '+sf.team2+'</div></div>'
  }
  html += '</div>'

  // Final
  const f = po.final
  html += '<div class="section"><div class="section-title">Final (Neutral Site)</div><div class="bracket-series" style="border-left-color:var(--gold);border-left-width:4px"><div class="bracket-teams" style="font-size:18px">'+f.team1+' vs '+f.team2+'</div><div style="font-size:24px;font-weight:800;color:var(--white);margin:8px 0">'+f.score[0]+' - '+f.score[1]+'</div><div class="bracket-winner" style="font-size:16px">\u{1F3C6} '+f.winner+'</div>'+(f.captain?'<div style="font-size:13px;color:var(--text2);margin-top:4px">Captain '+f.captain+' lifts the '+CONFIG.trophy.name+'</div>':'')+'</div></div>'

  el.innerHTML = html
}

let scheduleCache = null

async function fetchSchedule(force) {
  if (scheduleCache && !force) return scheduleCache
  const res = await fetch('/api/schedule')
  scheduleCache = await res.json()
  return scheduleCache
}

function starsHTML(grade) {
  let s = ''
  for (let i = 1; i <= 5; i++) {
    if (grade >= i) s += '<span class="star">\u2605</span>'
    else if (grade >= i - 0.5) s += '<span class="star">\u00BD</span>'
    else s += '<span class="star empty">\u2605</span>'
  }
  return s
}

async function renderCurrentSeason(main, parts) {
  main.innerHTML = '<div class="loading">Loading schedule...</div>'
  const schedule = await fetchSchedule()
  if (!schedule || !schedule.matchdays) { main.innerHTML = '<div class="empty-state">No schedule found. Run node schedule.js first.</div>'; return }

  const part0 = parts.length > 0 ? parts[0] : ''
  const part1 = parts.length > 1 ? parts[1] : ''
  const isStats = part0 === 'stats'
  const isEndOfSeason = part0 === 'endofseason'
  const isCoaches = part0 === 'coaches'
  const isPlayoffs = part0 === 'playoffs'
  const isReport = part1 === 'report'
  const mdNum = (isStats || isEndOfSeason || isCoaches || isPlayoffs) ? 0 : (part0 !== '' ? parseInt(part0, 10) : 0)

  main.innerHTML = ''
  main.appendChild(h('div','page-title','Season ' + schedule.season + ' \u2014 Current Season'))

  // Matchday nav buttons
  const nav = h('div','matchday-nav')
  for (const md of schedule.matchdays) {
    const completed = md.matches.every(m => m.status === 'completed')
    const partial = !completed && md.matches.some(m => m.status === 'completed')
    const cls = 'md-btn' + (md.number === mdNum && !isStats ? ' active' : '') + (completed ? ' completed' : '') + (partial ? ' partial' : '')
    const btn = h('div', cls, '' + md.number)
    btn.title = 'Matchday ' + md.number + (completed ? ' (completed)' : partial ? ' (in progress)' : '')
    btn.onclick = () => go('season/' + md.number)
    nav.appendChild(btn)
  }
  // Playoffs button (show after all regular season matches are played)
  const allRegPlayed = schedule.matchdays.every(md => md.matches.every(m => m.status === 'completed'))
  if (allRegPlayed) {
    const poBtn = h('div', 'md-btn po-btn' + (isPlayoffs ? ' active' : ''), '\u{26BD}')
    poBtn.title = 'Playoffs'
    poBtn.style.width = 'auto'
    poBtn.style.padding = '0 12px'
    poBtn.style.fontSize = '16px'
    poBtn.onclick = () => go('season/playoffs')
    if (schedule.playoffs && schedule.playoffs.champion) { poBtn.style.borderColor = 'var(--gold)'; poBtn.style.color = 'var(--gold)' }
    else if (schedule.playoffs) { poBtn.style.borderColor = 'var(--orange)'; poBtn.style.color = 'var(--orange)' }
    nav.appendChild(poBtn)
  }

  // Stats button
  const statsBtn = h('div', 'md-btn stats-btn' + (isStats ? ' active' : ''), '\u{1F4CA}')
  statsBtn.title = 'Season Statistics'
  statsBtn.style.width = 'auto'
  statsBtn.style.padding = '0 12px'
  statsBtn.style.fontSize = '16px'
  statsBtn.onclick = () => go('season/stats')
  nav.appendChild(statsBtn)

  // Coaches button
  const coachBtn = h('div', 'md-btn coach-btn' + (isCoaches ? ' active' : ''), '\u{1F4CB}')
  coachBtn.title = 'Coach Management'
  coachBtn.style.width = 'auto'
  coachBtn.style.padding = '0 12px'
  coachBtn.style.fontSize = '16px'
  coachBtn.onclick = () => go('season/coaches')
  nav.appendChild(coachBtn)

  // End of Season button (only show if all regular season matches are played)
  const allPlayed = schedule.matchdays.every(md => md.matches.every(m => m.status === 'completed'))
  if (allPlayed) {
    const eosBtn = h('div', 'md-btn eos-btn' + (isEndOfSeason ? ' active' : ''), '\u{1F3C6}')
    eosBtn.title = 'End of Season'
    eosBtn.style.width = 'auto'
    eosBtn.style.padding = '0 12px'
    eosBtn.style.fontSize = '16px'
    eosBtn.onclick = () => go('season/endofseason')
    nav.appendChild(eosBtn)
  }
  main.appendChild(nav)

  if (isEndOfSeason) {
    renderEndOfSeason(main, schedule)
    return
  }

  if (isPlayoffs) {
    renderPlayoffs(main, schedule)
    return
  }

  if (isCoaches) {
    renderCoachManagement(main)
    return
  }

  if (isStats) {
    renderSeasonStats(main, schedule)
    return
  }

  if (isReport && window._lastReport) {
    renderMatchdayReport(main, window._lastReport, mdNum)
    return
  }

  if (mdNum === 0) {
    // Overview: show standings summary
    renderSeasonOverview(main, schedule)
    return
  }

  const md = schedule.matchdays.find(m => m.number === mdNum)
  if (!md) { main.innerHTML += '<div class="empty-state">Matchday not found</div>'; return }

  const sub = h('div','page-sub')
  const done = md.matches.filter(m => m.status === 'completed').length
  sub.textContent = 'Matchday ' + mdNum + ' \u2014 ' + done + '/' + md.matches.length + ' matches played'
  main.appendChild(sub)

  // Simulate All button
  if (done < md.matches.length) {
    const simAll = h('button','mc-btn simulate','Simulate All Remaining')
    simAll.style.marginBottom = '16px'
    simAll.onclick = async () => {
      simAll.disabled = true
      simAll.textContent = 'Simulating...'
      for (let i = 0; i < md.matches.length; i++) {
        if (md.matches[i].status !== 'completed') {
          await fetch('/api/simulate/' + mdNum + '/' + i, { method: 'POST' })
        }
      }
      scheduleCache = null
      go('season/' + mdNum)
    }
    main.appendChild(simAll)
  }

  // Generate Report buttons (when all matches completed)
  if (done === md.matches.length && done > 0) {
    const reportRow = h('div','','')
    reportRow.style.cssText = 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap'

    function makeReportBtn(label, engine, gradient) {
      const btn = h('button','mc-btn report-btn', label)
      btn.style.cssText = 'background:'+gradient+';border:none;color:white;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex:1;min-width:180px'
      btn.onclick = async () => {
        reportRow.querySelectorAll('button').forEach(function(b){b.disabled=true;b.style.opacity='0.5'})
        btn.textContent = engine === 'ai' ? '\u{1F916} Generating with Claude...' : '\u{1F4DD} Generating report...'
        btn.style.opacity = '0.7'
        try {
          const resp = await fetch('/api/generate-report/' + mdNum, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ engine: engine }) })
          const data = await resp.json()
          if (data.success) {
            window._lastReport = data
            go('season/' + mdNum + '/report')
          } else {
            alert('Error: ' + (data.error || 'Unknown'))
            btn.textContent = label; reportRow.querySelectorAll('button').forEach(function(b){b.disabled=false;b.style.opacity='1'})
          }
        } catch (e) {
          alert('Error: ' + e.message)
          btn.textContent = label; reportRow.querySelectorAll('button').forEach(function(b){b.disabled=false;b.style.opacity='1'})
        }
      }
      return btn
    }

    reportRow.appendChild(makeReportBtn('\u{1F4F0} Local Report', 'local', 'linear-gradient(135deg,#4f46e5,#3730a3)'))
    reportRow.appendChild(makeReportBtn('\u{1F916} AI Report (Claude)', 'ai', 'linear-gradient(135deg,#7c3aed,#c026d3)'))
    main.appendChild(reportRow)
  }

  // Match cards
  for (let i = 0; i < md.matches.length; i++) {
    const match = md.matches[i]
    main.appendChild(buildMatchCard(match, mdNum, i))
  }
}

function renderSeasonOverview(main, schedule) {
  const sub = h('div','page-sub')
  const totalMatches = schedule.matchdays.reduce((s, md) => s + md.matches.length, 0)
  const played = schedule.matchdays.reduce((s, md) => s + md.matches.filter(m => m.status === 'completed').length, 0)
  sub.textContent = played + '/' + totalMatches + ' matches played \u2022 Click a matchday to view'
  main.appendChild(sub)

  // Build quick standings from completed matches (only teams in the schedule)
  const schedTeams = new Set()
  for (const md of schedule.matchdays) { for (const m of md.matches) { schedTeams.add(m.home); schedTeams.add(m.away) } }
  const table = {}
  for (const name of schedTeams) {
    table[name] = { team: name, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }
  }
  for (const md of schedule.matchdays) {
    for (const m of md.matches) {
      if (m.status !== 'completed') continue
      const h = table[m.home], a = table[m.away]
      if (!h || !a) continue
      h.p++; a.p++
      h.gf += m.score[0]; h.ga += m.score[1]
      a.gf += m.score[1]; a.ga += m.score[0]
      if (m.score[0] > m.score[1]) { h.w++; h.pts += 3; a.l++ }
      else if (m.score[1] > m.score[0]) { a.w++; a.pts += 3; h.l++ }
      else { h.d++; a.d++; h.pts++; a.pts++ }
    }
  }
  const rows = Object.values(table).sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf)

  let html = '<div class="section"><div class="section-title">Standings</div><table class="stats"><thead><tr><th>#</th><th>Team</th><th>OVR</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>'
  rows.forEach((r, i) => {
    const team = teamByName(r.team)
    const c = teamColor(team)
    const ovr = teamOvr(team)
    html += '<tr><td>' + (i + 1) + '</td><td style="cursor:pointer;color:var(--white)" onclick="go(\u0027statistics/teams/' + encodeURIComponent(r.team) + '\u0027)"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + c + ';margin-right:8px"></span>' + r.team + '</td><td style="color:var(--text2);font-size:12px">' + ovr + '</td><td>' + r.p + '</td><td>' + r.w + '</td><td>' + r.d + '</td><td>' + r.l + '</td><td>' + r.gf + '</td><td>' + r.ga + '</td><td>' + (r.gf - r.ga) + '</td><td style="font-weight:700">' + r.pts + '</td></tr>'
  })
  html += '</tbody></table></div>'
  main.appendChild(h('div', '', html))
}

async function renderPlayoffs(main, schedule) {
  const po = schedule.playoffs

  // If playoffs haven't started yet, show init button
  if (!po) {
    const panel = h('div','section')
    panel.innerHTML = '<div class="section-title">Playoffs</div><p style="color:var(--text);margin-bottom:16px">The regular season is complete. Top 8 teams qualify for the playoffs.</p><p style="color:var(--text2);font-size:13px;margin-bottom:20px">Format: Quarterfinals (Best of 3) \u2192 Semifinals (Single game) \u2192 Final (Single game)</p>'
    const initBtn = h('button','mc-btn','\u{1F3C6} Initialize Playoffs')
    initBtn.style.cssText = 'background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:white;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit'
    initBtn.onclick = async () => {
      initBtn.disabled = true; initBtn.textContent = 'Setting up bracket...'
      const resp = await fetch('/api/init-playoffs', { method: 'POST' })
      const data = await resp.json()
      if (data.success) { scheduleCache = null; go('season/playoffs') }
      else { alert(data.error); initBtn.disabled = false; initBtn.textContent = '\u{1F3C6} Initialize Playoffs' }
    }
    panel.appendChild(initBtn)
    main.appendChild(panel)
    return
  }

  // --- Quarterfinals ---
  const qfSection = h('div','section')
  let qfHtml = '<div class="section-title">Quarterfinals (Best of 3)</div>'
  const allQfDone = po.quarterFinals.every(qf => qf.winner)

  po.quarterFinals.forEach((qf, qi) => {
    const t1 = teamByName(qf.higherSeed), t2 = teamByName(qf.lowerSeed)
    const c1 = teamColor(t1), c2 = teamColor(t2)
    const statusText = qf.winner ? '<span style="color:var(--green);font-weight:700">' + qf.winner + ' wins ' + qf.seriesScore + '</span>' : '<span style="color:var(--orange)">In progress (' + qf.games.length + '/3 games)</span>'
    qfHtml += '<div class="bracket-series"><div class="bracket-teams"><span style="color:' + c1 + '">#' + qf.seedNums[0] + ' ' + qf.higherSeed + '</span> vs <span style="color:' + c2 + '">#' + qf.seedNums[1] + ' ' + qf.lowerSeed + '</span> \u2014 ' + statusText + '</div>'
    if (qf.games.length > 0) {
      qfHtml += '<div class="bracket-games">'
      qf.games.forEach((g, gi) => {
        const hw = g.score[0] > g.score[1], aw = g.score[1] > g.score[0]
        qfHtml += '<span style="margin-right:16px">G' + (gi + 1) + ': ' + (hw ? '<b>' : '') + g.home + ' ' + g.score[0] + (hw ? '</b>' : '') + '-' + (aw ? '<b>' : '') + g.score[1] + ' ' + g.away + (aw ? '</b>' : '') + '</span>'
      })
      qfHtml += '</div>'
    }
    qfHtml += '</div>'
  })
  qfSection.innerHTML = qfHtml
  main.appendChild(qfSection)

  // Simulate QF buttons
  po.quarterFinals.forEach((qf, qi) => {
    if (qf.winner) return
    const simBtn = h('button','mc-btn','\u26BD Simulate Next Game: #' + qf.seedNums[0] + ' ' + qf.higherSeed + ' vs #' + qf.seedNums[1] + ' ' + qf.lowerSeed)
    simBtn.style.cssText = 'margin-bottom:8px;background:var(--card);border:1px solid var(--border);color:var(--white);padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;display:block'
    simBtn.onclick = async () => {
      simBtn.disabled = true; simBtn.textContent = 'Simulating...'
      const resp = await fetch('/api/simulate-playoff/qf/' + qi, { method: 'POST' })
      const data = await resp.json()
      if (data.success) { scheduleCache = null; go('season/playoffs') }
      else { alert(data.error); simBtn.disabled = false }
    }
    main.appendChild(simBtn)
  })

  // --- Semifinals ---
  if (allQfDone) {
    const sfSection = h('div','section')
    sfSection.style.marginTop = '16px'
    let sfHtml = '<div class="section-title">Semifinals (Neutral Site)</div>'

function aggregatePlayerStats(schedule) {
  const players = {}
  for (const md of schedule.matchdays) {
    for (const m of md.matches) {
      if (m.status !== 'completed' || !m.playerStats) continue
      const sides = [
        { stats: m.playerStats.home, team: m.home },
        { stats: m.playerStats.away, team: m.away }
      ]
      for (const side of sides) {
        for (const p of side.stats) {
          const key = p.name + ':' + side.team
          if (!players[key]) {
            players[key] = { name: p.name, team: side.team, position: p.position, matches: 0, goals: 0, assists: 0, saves: 0, passOn: 0, passTotal: 0, tackleOn: 0, tackleTotal: 0, gradeSum: 0 }
          }
          const r = players[key]
          r.matches++
          r.goals += p.goals || 0
          r.assists += p.assists || 0
          if (p.saves !== undefined) r.saves += p.saves
          if (p.passes) { r.passOn += p.passes.on; r.passTotal += p.passes.total }
          if (p.tackles) { r.tackleOn += p.tackles.on; r.tackleTotal += p.tackles.total }
          r.gradeSum += p.grade || 0
        }
      }
    }
  }
  return Object.values(players)
}

function renderSeasonStats(main, schedule) {
  const played = schedule.matchdays.reduce((s, md) => s + md.matches.filter(m => m.status === 'completed').length, 0)
  const sub = h('div','page-sub','Season statistics from ' + played + ' completed matches (simulated only)')
  main.appendChild(sub)

  const all = aggregatePlayerStats(schedule)
  if (all.length === 0) {
    main.appendChild(h('div','empty-state','No simulated matches yet. Simulate some matches to see statistics.'))
    return
  }

  // League table (only teams in the schedule)
  const schedTeams2 = new Set()
  for (const md of schedule.matchdays) { for (const m of md.matches) { schedTeams2.add(m.home); schedTeams2.add(m.away) } }
  const table = {}
  for (const name of schedTeams2) {
    table[name] = { team: name, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }
  }
  for (const md of schedule.matchdays) {
    for (const m of md.matches) {
      if (m.status !== 'completed') continue
      const hh = table[m.home], aa = table[m.away]
      if (!hh || !aa) continue
      hh.p++; aa.p++
      hh.gf += m.score[0]; hh.ga += m.score[1]
      aa.gf += m.score[1]; aa.ga += m.score[0]
      if (m.score[0] > m.score[1]) { hh.w++; hh.pts += 3; aa.l++ }
      else if (m.score[1] > m.score[0]) { aa.w++; aa.pts += 3; hh.l++ }
      else { hh.d++; aa.d++; hh.pts++; aa.pts++ }
    }
  }
  const rows = Object.values(table).sort((a, b) => b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga) || b.gf - a.gf)

  let thtml = '<div class="section"><div class="section-title">League Table</div><table class="stats"><thead><tr><th>#</th><th>Team</th><th>OVR</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>'
  rows.forEach((r, i) => {
    const team = teamByName(r.team)
    const c = teamColor(team)
    const ovr = teamOvr(team)
    thtml += '<tr><td>' + (i + 1) + '</td><td style="cursor:pointer;color:var(--white)" onclick="go(\u0027statistics/teams/' + encodeURIComponent(r.team) + '\u0027)"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + c + ';margin-right:8px"></span>' + r.team + '</td><td style="color:var(--text2);font-size:12px">' + ovr + '</td><td>' + r.p + '</td><td>' + r.w + '</td><td>' + r.d + '</td><td>' + r.l + '</td><td>' + r.gf + '</td><td>' + r.ga + '</td><td>' + (r.gf - r.ga) + '</td><td style="font-weight:700">' + r.pts + '</td></tr>'
  })
  thtml += '</tbody></table></div>'
  main.appendChild(h('div', '', thtml))

  // Leader boards
  const grid = h('div','leader-grid')

  function leaderBoard(title, icon, list, valueFn, formatFn, limit) {
    limit = limit || 10
    const sorted = list.filter(p => p.matches > 0).sort((a, b) => valueFn(b) - valueFn(a)).slice(0, limit)
    const card = h('div','leader-card')
    let html = '<div class="leader-title"><span class="icon">' + icon + '</span>' + title + '</div>'
    sorted.forEach((p, i) => {
      const team = teamByName(p.team)
      const c = teamColor(team)
      const val = formatFn ? formatFn(p) : valueFn(p)
      html += '<div class="leader-row"><div class="leader-rank' + (i < 3 ? ' top' : '') + '">' + (i + 1) + '</div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + c + '"></span><div class="leader-name">' + p.name + ' <span class="leader-team">' + p.position + ' \u2022 ' + p.team + '</span></div><div class="leader-value">' + val + '</div></div>'
    })
    card.innerHTML = html
    return card
  }

  // Goals
  grid.appendChild(leaderBoard('Top Scorers', '\u26BD', all, p => p.goals, p => p.goals + (p.matches > 0 ? ' <span style="font-size:11px;color:var(--text2);font-weight:400">(' + p.matches + ' mp)</span>' : '')))

  // Assists
  grid.appendChild(leaderBoard('Assist Leaders', '\u{1F91D}', all, p => p.assists, p => p.assists + (p.matches > 0 ? ' <span style="font-size:11px;color:var(--text2);font-weight:400">(' + p.matches + ' mp)</span>' : '')))

  // Saves (GKs)
  const gks = all.filter(p => p.position === 'GK')
  grid.appendChild(leaderBoard('Save Leaders', '\u{1F9E4}', gks, p => p.saves, p => p.saves + (p.matches > 0 ? ' <span style="font-size:11px;color:var(--text2);font-weight:400">(' + p.matches + ' mp)</span>' : ''), 10))

  // Pass accuracy (min 1 match)
  grid.appendChild(leaderBoard('Pass Accuracy', '\u{1F3AF}', all.filter(p => p.passTotal >= 15), p => p.passTotal > 0 ? p.passOn / p.passTotal : 0, p => {
    const pct = p.passTotal > 0 ? Math.round(p.passOn / p.passTotal * 100) : 0
    return pct + '% <span style="font-size:11px;color:var(--text2);font-weight:400">(' + p.passOn + '/' + p.passTotal + ')</span>'
  }))

  // Tackle accuracy (min 1 match, non-GK)
  grid.appendChild(leaderBoard('Tackle Accuracy', '\u{1F6E1}', all.filter(p => p.tackleTotal >= 5 && p.position !== 'GK'), p => p.tackleTotal > 0 ? p.tackleOn / p.tackleTotal : 0, p => {
    const pct = p.tackleTotal > 0 ? Math.round(p.tackleOn / p.tackleTotal * 100) : 0
    return pct + '% <span style="font-size:11px;color:var(--text2);font-weight:400">(' + p.tackleOn + '/' + p.tackleTotal + ')</span>'
  }))

  // Star rating (avg)
  grid.appendChild(leaderBoard('Star Rating', '\u2B50', all.filter(p => p.matches > 0), p => p.gradeSum / p.matches, p => {
    const avg = (p.gradeSum / p.matches)
    return starsHTML(Math.round(avg * 2) / 2) + ' <span style="font-size:11px;color:var(--text2);font-weight:400">' + avg.toFixed(2) + '</span>'
  }))

  main.appendChild(grid)
}

async function renderCoachManagement(main) {
  main.appendChild(h('div','page-sub','Set each coach\u0027s tactical philosophy. Style affects match simulation based on the coach\u0027s skill level.'))

  // Fetch fresh league data
  const res = await fetch('/api/league')
  const league = await res.json()

  for (const team of league.teams) {
    const coach = team.coach
    const tc = teamColor(team)
    const card = h('div','coach-card')

    const header = h('div','coach-card-header')
    header.innerHTML = miniAv(coach.name, tc) +
      '<div class="coach-info"><div style="font-size:16px;font-weight:700;color:var(--white)">' + coach.name + '</div>' +
      '<div style="font-size:13px;color:var(--text2)">' + team.name + ' \u2022 Rating: <span style="color:var(--white);font-weight:600">' + coach.rating + '</span></div></div>'
    card.appendChild(header)

    const picker = h('div','style-picker')
    for (const [key, info] of Object.entries(STYLES)) {
      const opt = h('div','style-opt' + (coach.style === key ? ' active' : ''))
      opt.innerHTML = '<div>' + info.icon + ' ' + info.label + '</div><div class="style-desc">' + info.desc + '</div><div style="margin-top:4px">' +
        info.boosts.map(b => {
          const isNeg = b.includes('-')
          return '<span class="style-boost ' + (isNeg ? 'neg' : 'pos') + '">' + b + '</span>'
        }).join('') + '</div>'

      opt.onclick = async () => {
        if (coach.style === key) return
        opt.style.opacity = '0.5'
        try {
          await fetch('/api/coach-style/' + encodeURIComponent(team.name), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ style: key })
          })
          coach.style = key
          picker.querySelectorAll('.style-opt').forEach(o => o.classList.remove('active'))
          opt.classList.add('active')
        } catch (e) {
          alert('Error: ' + e.message)
        }
        opt.style.opacity = '1'
      }
      picker.appendChild(opt)
    }
    card.appendChild(picker)
    main.appendChild(card)
  }
}

function renderDevelopmentResults(main, data) {
  // Summary stats

  const declined = data.results.filter(r => r.ratingDelta < 0).length
  const unchanged = data.results.filter(r => r.ratingDelta === 0).length

  const summary = h('div','section')
  summary.innerHTML = '<div class="section-title">Development Summary</div>' +
    '<div style="display:flex;gap:32px;flex-wrap:wrap;margin-bottom:8px">' +
    '<div><div style="font-size:24px;font-weight:800;color:var(--green)">' + improved + '</div><div style="font-size:12px;color:var(--text2)">Improved</div></div>' +
    '<div><div style="font-size:24px;font-weight:800;color:var(--text2)">' + unchanged + '</div><div style="font-size:12px;color:var(--text2)">Unchanged</div></div>' +
    '<div><div style="font-size:24px;font-weight:800;color:var(--red)">' + declined + '</div><div style="font-size:12px;color:var(--text2)">Declined</div></div>' +
    '<div><div style="font-size:24px;font-weight:800;color:var(--white)">' + totalPlayers + '</div><div style="font-size:12px;color:var(--text2)">Total Players</div></div>' +

  main.appendChild(summary)

  // Top improvers
  main.appendChild(h('div','section-title','\u{1F4C8} Biggest Improvers'))
  const impGrid = h('div','grid grid-2')
  impGrid.style.marginBottom = '24px'
  for (const r of data.improvers.filter(x => x.ratingDelta > 0)) {
    impGrid.appendChild(devCard(r))
  }
  main.appendChild(impGrid)

  // Top decliners
  main.appendChild(h('div','section-title','\u{1F4C9} Biggest Decliners'))
  const decGrid = h('div','grid grid-2')
  decGrid.style.marginBottom = '24px'
  for (const r of data.decliners.filter(x => x.ratingDelta < 0)) {
    decGrid.appendChild(devCard(r))
  }
  main.appendChild(decGrid)

  // Full team-by-team breakdown
  main.appendChild(h('div','section-title','\u{1F4CB} All Players'))
  const teams = {}
  for (const r of data.results) {
    if (!teams[r.team]) teams[r.team] = []
    teams[r.team].push(r)
  }

  for (const [teamName, players] of Object.entries(teams)) {
    const team = teamByName(teamName)
    const c = teamColor(team)
    const sec = h('div','section')
    let html = '<div class="section-title"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + c + ';margin-right:8px"></span>' + teamName + '</div>'
    html += '<table class="stats"><thead><tr><th>Player</th><th>Pos</th><th>Age</th><th>Pot</th><th>Old</th><th>New</th><th>+/-</th></tr></thead><tbody>'
    for (const r of players) {
      const cls = r.ratingDelta > 0 ? 'color:var(--green)' : r.ratingDelta < 0 ? 'color:var(--red)' : 'color:var(--text2)'
      const potPct = Math.round((r.potential - 0.6) / 0.8 * 100)
      const potColor = r.potential >= 1.1 ? 'var(--green)' : r.potential >= 0.9 ? 'var(--gold)' : 'var(--red)'
      html += '<tr><td style="color:var(--white)">' + r.name + '</td><td>' + r.position + '</td><td>' + r.age + '\u2192' + (r.age + 1) + '</td><td><div class="pot-bar"><div class="pot-fill" style="width:' + potPct + '%;background:' + potColor + '"></div></div></td><td>' + r.oldRating + '</td><td style="font-weight:700">' + r.newRating + '</td><td style="' + cls + ';font-weight:700">' + (r.ratingDelta >= 0 ? '+' : '') + r.ratingDelta + '</td></tr>'
    }
    html += '</tbody></table>'
    sec.innerHTML = html
    main.appendChild(sec)
  }
}

function devCard(r) {
  const card = h('div','dev-card')
  const team = teamByName(r.team)
  const c = teamColor(team)
  const cls = r.ratingDelta > 0 ? 'up' : r.ratingDelta < 0 ? 'down' : 'same'
  const sign = r.ratingDelta > 0 ? '+' : ''

  let skillsHTML = ''
  for (const [skill, change] of Object.entries(r.changes)) {
    if (Math.abs(change.delta) >= 2) {
      const sCls = change.delta > 0 ? 'up' : 'down'
      const sSign = change.delta > 0 ? '+' : ''
      skillsHTML += '<span class="dev-skill ' + sCls + '">' + skill.replace(/_/g, ' ') + ' ' + sSign + change.delta + '</span>'
    }
  }

  card.innerHTML = '<div class="dev-delta ' + cls + '">' + sign + r.ratingDelta + '</div>' +
    miniAv(r.name, c) +
    '<div style="flex:1"><div class="dev-name">' + r.name + '</div><div class="dev-meta">' + r.position + ' \u2022 ' + r.team + ' \u2022 Age ' + r.age + '\u2192' + (r.age + 1) + '</div>' +
    (skillsHTML ? '<div class="dev-skills">' + skillsHTML + '</div>' : '') +
    '</div>'
  return card
}

function buildMatchCard(match, mdNum, idx) {
  const card = h('div', 'match-card' + (match.status === 'completed' ? ' completed' : ''))
  const homeTeam = teamByName(match.home)
  const awayTeam = teamByName(match.away)
  const hc = teamColor(homeTeam), ac = teamColor(awayTeam)

  let headerHTML = '<div class="mc-team">' + miniAv(match.home, hc) + '<div class="mc-team-name">' + match.home + '</div></div>'

  if (match.status === 'completed') {
    const hWin = match.score[0] > match.score[1], aWin = match.score[1] > match.score[0]
    headerHTML += '<div class="mc-score"><div class="mc-score-value">' + match.score[0] + ' - ' + match.score[1] + '</div><div class="mc-score-label">' + (match.method === 'simulated' ? 'Simulated' : 'Manual') + ' <button class="mse-edit-btn" onclick="event.stopPropagation();openMatchStatsEditor(' + mdNum + ',' + idx + ')">Edit Stats</button></div></div>'
    headerHTML += '<div class="mc-team away"><div class="mc-team-name">' + match.away + '</div>' + miniAv(match.away, ac) + '</div>'
  } else {
    headerHTML += '<div class="mc-score"><div class="mc-pending" id="pending-' + mdNum + '-' + idx + '">'
    headerHTML += '<button class="mc-btn simulate" onclick="simulateMatch(' + mdNum + ',' + idx + ')">Simulate</button>'
    headerHTML += '<button class="mc-btn enter" onclick="showScoreInput(' + mdNum + ',' + idx + ')">Enter Score</button>'
    headerHTML += '</div></div>'
    headerHTML += '<div class="mc-team away"><div class="mc-team-name">' + match.away + '</div>' + miniAv(match.away, ac) + '</div>'
  }

  const header = h('div', 'mc-header')
  header.innerHTML = headerHTML
  card.appendChild(header)

  // Goal events for completed matches
  if (match.status === 'completed' && match.goalEvents) {
    const ge = match.goalEvents
    const eventsEl = h('div', 'mc-goal-events')
    let evHTML = '<div class="mc-goals-col">'
    if (ge.home && ge.home.length > 0) {
      for (const ev of ge.home) {
        if (ev.missed) { evHTML += '<div class="mc-goal-ev missed">\u274C <span class="mc-pen-label">PEN</span> ' + ev.scorer + '</div>'; continue }
        evHTML += '<div class="mc-goal-ev">' + (ev.penalty ? '<span class="mc-pen-label">PEN</span> ' : '\u26BD ') + ev.scorer + (ev.assister ? ' <span class="mc-assist">(' + ev.assister + ')</span>' : '') + '</div>'
      }
    }
    evHTML += '</div><div class="mc-goals-col away">'
    if (ge.away && ge.away.length > 0) {
      for (const ev of ge.away) {
        if (ev.missed) { evHTML += '<div class="mc-goal-ev missed">' + ev.scorer + ' <span class="mc-pen-label">PEN</span> \u274C</div>'; continue }
        evHTML += '<div class="mc-goal-ev">' + (ev.assister ? '<span class="mc-assist">(' + ev.assister + ')</span> ' : '') + ev.scorer + (ev.penalty ? ' <span class="mc-pen-label">PEN</span>' : ' \u26BD') + '</div>'
      }
    }
    evHTML += '</div>'
    eventsEl.innerHTML = evHTML
    card.appendChild(eventsEl)
  }

  // Player stats details for completed matches
  if (match.status === 'completed' && match.playerStats) {
    const details = h('div', 'mc-details')
    let detailsHTML = '<div class="mc-roster">'

    // Home roster
    detailsHTML += '<div class="mc-roster-team"><div class="mc-roster-title">' + match.home + '</div>'
    for (const p of match.playerStats.home) {
      detailsHTML += playerStatRow(p)
    }
    detailsHTML += '</div>'

    // Away roster
    detailsHTML += '<div class="mc-roster-team"><div class="mc-roster-title">' + match.away + '</div>'
    for (const p of match.playerStats.away) {
      detailsHTML += playerStatRow(p)
    }
    detailsHTML += '</div></div>'

    details.innerHTML = detailsHTML
    card.appendChild(details)
  }

  return card
}

function playerStatRow(p) {
  const statsText = []
  if (p.goals > 0) statsText.push(p.goals + 'G')
  if (p.assists > 0) statsText.push(p.assists + 'A')
  if (p.saves !== undefined) statsText.push(p.saves + 'S')
  const statStr = statsText.length > 0 ? statsText.join(' ') : '-'
  return '<div class="mc-player"><span class="mc-player-name">' + p.name + ' <span style="color:var(--text2);font-size:11px">' + p.position + '</span></span><span class="mc-player-stats">' + statStr + '</span><span class="mc-player-grade">' + starsHTML(p.grade) + '</span></div>'
}

async function simulateMatch(mdNum, idx) {
  const pending = document.getElementById('pending-' + mdNum + '-' + idx)
  if (pending) pending.innerHTML = '<div class="loading">Simulating...</div>'
  try {
    await fetch('/api/simulate/' + mdNum + '/' + idx, { method: 'POST' })
    scheduleCache = null
    go('season/' + mdNum)
  } catch (e) {
    if (pending) pending.innerHTML = '<div style="color:var(--red)">Error: ' + e.message + '</div>'
  }
}

function showScoreInput(mdNum, idx) {
  const pending = document.getElementById('pending-' + mdNum + '-' + idx)
  if (!pending) return
  pending.innerHTML = '<div class="score-input"><input type="number" id="sh-' + mdNum + '-' + idx + '" min="0" max="10" value="0"><span class="vs">-</span><input type="number" id="sa-' + mdNum + '-' + idx + '" min="0" max="10" value="0"></div><div style="display:flex;gap:8px;justify-content:center;margin-top:4px"><button class="score-submit" onclick="submitScore(' + mdNum + ',' + idx + ')">Save</button><button class="score-cancel" onclick="go(\u0027season/' + mdNum + '\u0027)">Cancel</button></div>'
}

async function submitScore(mdNum, idx) {
  const hVal = parseInt(document.getElementById('sh-' + mdNum + '-' + idx).value, 10) || 0
  const aVal = parseInt(document.getElementById('sa-' + mdNum + '-' + idx).value, 10) || 0
  try {
    await fetch('/api/enter-score/' + mdNum + '/' + idx, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ score: [hVal, aVal] })
    })
    scheduleCache = null
    go('season/' + mdNum)
  } catch (e) {
    alert('Error: ' + e.message)
  }
}

async function openMatchStatsEditor(mdNum, matchIdx) {
  const schedule = await fetchSchedule()
  if (!schedule) return
  const md = schedule.matchdays.find(m => m.number === mdNum)
  if (!md || matchIdx >= md.matches.length) return
  const match = md.matches[matchIdx]
  if (match.status !== 'completed') return

  const overlay = h('div','mse-overlay')
  const panel = h('div','mse-panel')

  let html = '<div class="mse-title">' + match.home + ' ' + match.score[0] + ' - ' + match.score[1] + ' ' + match.away + '</div>'
  html += '<div class="mse-sub">Edit player statistics for this match. Goals from penalties are tracked separately. Score updates automatically from goals + penalties made.</div>'

  function buildTeamSection(teamName, side) {
    const stats = match.playerStats ? match.playerStats[side] : null
    const goalEvents = match.goalEvents ? match.goalEvents[side] : []

    // Count penalties made/missed per player from goal events
    const penMade = {}, penMissed = {}
    for (const ev of goalEvents) {
      if (ev.penalty && !ev.missed) penMade[ev.scorer] = (penMade[ev.scorer] || 0) + 1
      if (ev.penalty && ev.missed) penMissed[ev.scorer] = (penMissed[ev.scorer] || 0) + 1
    }

    let s = '<div class="mse-team-section">'
    const team = teamByName(teamName)
    const tc = teamColor(team)
    s += '<div class="mse-team-label"><div class="mini-avatar" style="background:' + tc + ';width:22px;height:22px;font-size:10px;color:' + (hexLum(tc) > 180 ? '#222' : '#fff') + '">' + teamAbbrev(teamName) + '</div>' + teamName + '</div>'

    s += '<div class="mse-player-grid header"><div>Player</div><div>Rating</div><div>Goals</div><div>Assists</div><div>Saves</div><div>Pen \u2714</div><div>Pen \u2718</div></div>'

    if (stats) {
      for (let i = 0; i < stats.length; i++) {
        const p = stats[i]
        const openGoals = Math.max(0, (p.goals || 0) - (penMade[p.name] || 0))
        const pm = penMade[p.name] || 0
        const pmiss = penMissed[p.name] || 0

        s += '<div class="mse-player-grid">'
        s += '<div class="mse-player-name">' + p.name + ' <span class="pos">' + p.position + '</span></div>'
        s += '<input class="mse-input" type="number" min="1" max="5" step="0.5" value="' + (p.grade || 2.5) + '" data-side="' + side + '" data-idx="' + i + '" data-field="grade">'
        s += '<input class="mse-input" type="number" min="0" max="20" value="' + openGoals + '" data-side="' + side + '" data-idx="' + i + '" data-field="goals">'
        s += '<input class="mse-input" type="number" min="0" max="20" value="' + (p.assists || 0) + '" data-side="' + side + '" data-idx="' + i + '" data-field="assists">'
        s += '<input class="mse-input" type="number" min="0" max="30" value="' + (p.saves !== undefined ? p.saves : '') + '" data-side="' + side + '" data-idx="' + i + '" data-field="saves"' + (p.position !== 'GK' ? ' placeholder="-"' : '') + '>'
        s += '<input class="mse-input" type="number" min="0" max="10" value="' + pm + '" data-side="' + side + '" data-idx="' + i + '" data-field="penMade">'
        s += '<input class="mse-input" type="number" min="0" max="10" value="' + pmiss + '" data-side="' + side + '" data-idx="' + i + '" data-field="penMissed">'
        s += '</div>'
      }
    } else {
      s += '<div style="color:var(--text2);font-size:13px;padding:8px 0">No player stats available for this match.</div>'
    }
    s += '</div>'
    return s
  }

  html += buildTeamSection(match.home, 'home')
  html += buildTeamSection(match.away, 'away')

  html += '<div class="mse-actions"><button class="se-btn primary" id="mse-save">Save Changes</button><button class="se-btn" style="background:var(--card2);color:var(--text)" id="mse-cancel">Cancel</button></div>'
  html += '<div id="mse-status" class="se-status" style="margin-top:12px"></div>'

  panel.innerHTML = html
  overlay.appendChild(panel)
  document.body.appendChild(overlay)

  // Close on overlay click (not panel)
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove() }

  document.getElementById('mse-cancel').onclick = () => overlay.remove()

  document.getElementById('mse-save').onclick = async () => {
    const statusEl = document.getElementById('mse-status')
    const inputs = panel.querySelectorAll('.mse-input')

    // Gather data per side
    const data = { home: [], away: [] }
    const homeStats = match.playerStats ? match.playerStats.home : []
    const awayStats = match.playerStats ? match.playerStats.away : []

    for (const ps of homeStats) {
      data.home.push({ name: ps.name, position: ps.position, rating: ps.rating, grade: ps.grade, goals: 0, assists: 0, saves: ps.saves, penaltiesMade: 0, penaltiesMissed: 0 })
    }
    for (const ps of awayStats) {
      data.away.push({ name: ps.name, position: ps.position, rating: ps.rating, grade: ps.grade, goals: 0, assists: 0, saves: ps.saves, penaltiesMade: 0, penaltiesMissed: 0 })
    }

    for (const inp of inputs) {
      const side = inp.dataset.side
      const idx = parseInt(inp.dataset.idx, 10)
      const field = inp.dataset.field
      const val = inp.value === '' ? undefined : parseFloat(inp.value)
      if (val === undefined) continue
      const entry = data[side][idx]
      if (!entry) continue
      if (field === 'grade') entry.grade = val
      else if (field === 'goals') entry.goals = Math.max(0, Math.round(val))
      else if (field === 'assists') entry.assists = Math.max(0, Math.round(val))
      else if (field === 'saves') entry.saves = Math.max(0, Math.round(val))
      else if (field === 'penMade') entry.penaltiesMade = Math.max(0, Math.round(val))
      else if (field === 'penMissed') entry.penaltiesMissed = Math.max(0, Math.round(val))
    }

    statusEl.className = 'se-status show ok'
    statusEl.textContent = 'Saving...'

    try {
      const resp = await fetch('/api/edit-match-stats/' + mdNum + '/' + matchIdx, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      const result = await resp.json()
      if (result.success) {
        overlay.remove()
        scheduleCache = null
        go('season/' + mdNum)
      } else {
        statusEl.className = 'se-status show err'
        statusEl.textContent = 'Error: ' + (result.error || 'Unknown')
      }
    } catch(e) {
      statusEl.className = 'se-status show err'
      statusEl.textContent = 'Error: ' + e.message
    }
  }
}

  main.appendChild(h('div','page-title','Edit Season ' + seasonNum))

      '<div class="se-row"><span class="se-label">Primary</span><input type="color" class="se-color" value="' + team.colors.primary + '" data-ti="' + ti + '" data-field="colorPrimary" onchange="seUpdate(this)"><span class="se-label">Secondary</span><input type="color" class="se-color" value="' + team.colors.secondary + '" data-ti="' + ti + '" data-field="colorSecondary" onchange="seUpdate(this)"></div>' +

      '<div class="se-row"><span class="se-label">Rating</span><input class="se-input sm" type="number" min="40" max="99" value="' + coach.rating + '" data-ti="' + ti + '" data-field="coachRating" onchange="seUpdate(this)">' +

    body.innerHTML += playersHTML

  // Actions bar

  actions.innerHTML = '<button class="se-btn primary" onclick="seSave()">Save All Changes</button><button class="se-btn success" onclick="go(\'\')">Back to Home</button>'

  main.appendChild(container)

  // Store editor state globally for event handlers
  window._seState = editorState
  window._seSeasonNum = seasonNum
}

function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

function seUpdate(el) {
  const state = window._seState
  if (!state) return
  const ti = parseInt(el.dataset.ti, 10)
  const team = state.teams[ti]
  const field = el.dataset.field
  const val = el.value

  if (field === 'name') team.name = val
  else if (field === 'abbreviation') team.abbreviation = val || undefined
  else if (field === 'colorPrimary') team.colors.primary = val
  else if (field === 'colorSecondary') team.colors.secondary = val
  else if (field === 'coachName') team.coach.name = val
  else if (field === 'coachRating') team.coach.rating = val
  else if (field === 'coachStyle') team.coach.style = val
  else if (field.startsWith('player')) {
    const pi = parseInt(el.dataset.pi, 10)
    const p = team.players[pi]
    if (field === 'playerName') p.name = val
    else if (field === 'playerPos') p.position = val
    else if (field === 'playerRating') p.rating = val
    else if (field === 'playerAge') p.age = parseInt(val, 10)
  }
}

async function seSave() {
  const state = window._seState
  if (!state) return
  const statusEl = document.getElementById('se-status')

  // Prepare payload with originalName for matching
  const payload = state.teams.map(t => ({
    originalName: t._originalName,
    name: t.name,
    abbreviation: t.abbreviation,
    colors: t.colors,
    rating: t.rating,
    coach: t.coach,
    players: t.players.map(p => ({ name: p.name, position: p.position, rating: p.rating, age: p.age }))
  }))

  statusEl.className = 'se-status show ok'
  statusEl.textContent = 'Saving...'

  try {
    const resp = await fetch('/api/season-editor/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ teams: payload })
    })
    const data = await resp.json()
    if (data.success) {
      statusEl.className = 'se-status show ok'
      statusEl.textContent = 'Saved successfully! Site rebuilt.'
      // Update originalNames for subsequent saves
      for (let i = 0; i < state.teams.length; i++) {
        state.teams[i]._originalName = state.teams[i].name
      }
    } else {
      statusEl.className = 'se-status show err'
      statusEl.textContent = 'Error: ' + (data.error || 'Unknown')
    }
  } catch(e) {
    statusEl.className = 'se-status show err'
    statusEl.textContent = 'Error: ' + e.message
  }
}

function seTransfer(ti, pi) {
  const state = window._seState
  if (!state) return
  const team = state.teams[ti]
  const player = team.players[pi]

  const modal = h('div','se-transfer-modal')
  let optHTML = ''
  for (let i = 0; i < state.teams.length; i++) {
    if (i === ti) continue
    optHTML += '<option value="' + i + '">' + state.teams[i].name + '</option>'
  }

  let selectedMode = 'team' // default mode

  modal.innerHTML = '<div class="se-transfer-box"><h3>\u21C4 Transfer ' + escAttr(player.name) + '</h3>' +
    '<div style="margin-bottom:12px;font-size:13px;color:var(--text2)">From: ' + escAttr(team.name) + ' \u2022 ' + player.position + ' \u2022 Rtg ' + player.rating + '</div>' +
    '<div class="se-trade-options">' +
      '<div class="se-trade-opt selected" data-mode="team"><div class="trade-icon">\u21C4</div><div><div class="trade-lbl">Transfer to LFA Team</div><div class="trade-desc">Move to another team in the league</div></div></div>' +
      '<div class="se-trade-opt" data-mode="retired"><div class="trade-icon">\u{1F534}</div><div><div class="trade-lbl">Retire</div><div class="trade-desc">Player retires \u2014 added to Hall of Fame</div></div></div>' +
      '<div class="se-trade-opt" data-mode="abroad"><div class="trade-icon">\u{1F30D}</div><div><div class="trade-lbl">Playing Abroad</div><div class="trade-desc">Player leaves but continues developing \u2014 can be recalled later</div></div></div>' +
      '<div class="se-trade-opt" data-mode="non-lfa"><div class="trade-icon">\u{1F7E1}</div><div><div class="trade-lbl">Non-LFA Team</div><div class="trade-desc">Move to a team outside the LFA \u2014 may join the league later</div></div></div>' +
    '</div>' +
    '<div id="se-transfer-details"><label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Transfer to:</label><select class="se-select" id="se-transfer-target">' + optHTML + '</select></div>' +
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="se-btn primary" id="se-transfer-confirm">Confirm</button><button class="se-btn" style="background:var(--card2);color:var(--text)" id="se-transfer-cancel">Cancel</button></div></div>'

  document.body.appendChild(modal)

  // Helper: render non-LFA picker (existing teams + create-new option)
  function renderNonLfaPicker(details) {
    const nlList = (state.nonLfaTeams || [])
    let nlOpts = ''
    for (const nlt of nlList) {
      const count = (nlt.players && nlt.players.length) ? ' (' + nlt.players.length + ')' : ''
      nlOpts += '<option value="' + escAttr(nlt.name) + '">' + escAttr(nlt.name) + count + '</option>'
    }
    nlOpts += '<option value="__NEW__">+ Create new non-LFA team\u2026</option>'
    details.innerHTML =
      '<label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Non-LFA team:</label>' +
      '<select class="se-select" id="se-nonlfa-target">' + nlOpts + '</select>' +
      '<div id="se-nonlfa-new-wrap" style="display:none;margin-top:8px">' +
        '<label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">New team name:</label>' +
        '<input class="se-input lg" id="se-nonlfa-new" placeholder="e.g., FC Outsider" maxlength="60">' +
      '</div>' +
      '<div style="font-size:12px;color:var(--text2);padding:10px;background:rgba(255,255,255,.03);border-radius:8px;margin-top:10px">Player moves to a non-LFA team and is placed on its roster. Not added to the Hall of Fame. A non-LFA team can later be promoted into the LFA.</div>'
    const sel = document.getElementById('se-nonlfa-target')
    const wrap = document.getElementById('se-nonlfa-new-wrap')
    function sync() { wrap.style.display = (sel.value === '__NEW__') ? '' : 'none' }
    sel.onchange = sync
    if (!nlList.length) { sel.value = '__NEW__'; sync() }
  }

  // Mode selection
  modal.querySelectorAll('.se-trade-opt').forEach(opt => {
    opt.onclick = () => {
      modal.querySelectorAll('.se-trade-opt').forEach(o => o.classList.remove('selected'))
      opt.classList.add('selected')
      selectedMode = opt.dataset.mode
      const details = document.getElementById('se-transfer-details')
      if (selectedMode === 'team') {
        details.innerHTML = '<label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px">Transfer to:</label><select class="se-select" id="se-transfer-target">' + optHTML + '</select>'
      } else if (selectedMode === 'non-lfa') {
        renderNonLfaPicker(details)
      } else {
        const labels = { retired: 'Player will be added to the Hall of Fame as retired.', abroad: 'Player will continue aging and developing. Can be recalled to any LFA team later.' }
        details.innerHTML = '<div style="font-size:12px;color:var(--text2);padding:10px;background:rgba(255,255,255,.03);border-radius:8px">' + labels[selectedMode] + '</div>'
      }
    }
  })

  document.getElementById('se-transfer-cancel').onclick = () => modal.remove()
  document.getElementById('se-transfer-confirm').onclick = async () => {
    try {
      if (selectedMode === 'team') {
        const targetIdx = parseInt(document.getElementById('se-transfer-target').value, 10)
        const resp = await fetch('/api/transfer-player', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerName: player.name, fromTeam: team._originalName, toTeam: state.teams[targetIdx]._originalName })
        })
        const data = await resp.json()
        if (data.success) { modal.remove(); go('edit-season/' + window._seSeasonNum) }
        else alert('Error: ' + (data.error || 'Unknown'))
      } else if (selectedMode === 'non-lfa') {
        const sel = document.getElementById('se-nonlfa-target')
        if (!sel) { alert('Please choose or create a non-LFA team.'); return }
        let toName = sel.value
        if (toName === '__NEW__') {
          const inp = document.getElementById('se-nonlfa-new')
          toName = (inp && inp.value || '').trim()
          if (!toName) { alert('Please enter a name for the new non-LFA team.'); if (inp) inp.focus(); return }
        }
        const resp = await fetch('/api/trade-player-away', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerName: player.name, fromTeam: team._originalName, status: 'non-lfa', toNonLfaTeam: toName })
        })
        const data = await resp.json()
        if (data.success) { modal.remove(); go('edit-season/' + window._seSeasonNum) }
        else alert('Error: ' + (data.error || 'Unknown'))
      } else {
        const resp = await fetch('/api/trade-player-away', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerName: player.name, fromTeam: team._originalName, status: selectedMode })
        })
        const data = await resp.json()
        if (data.success) { modal.remove(); go('edit-season/' + window._seSeasonNum) }
        else alert('Error: ' + (data.error || 'Unknown'))
      }
    } catch(e) { alert('Error: ' + e.message) }
  }
}
